            {/* ========== TAB: GOALS (תכנית יעדים לבית 26-28) ========== */}
            {activeTab === 'goals' && (() => {
              const fields = [
                { key: 'incomeRent', label: 'הכנסה שכ"ד ישראל', color: '#065f46' },
                { key: 'incomeAdi', label: 'הכנסה עדי', color: '#065f46' },
                { key: 'incomeKfir', label: 'הכנסה כפיר', color: '#065f46' },
                { key: 'awareness', label: 'AWARENESS חו"ל', color: '#92400e' },
                { key: 'arbitration', label: 'בוררות', color: '#1e3a5f' },
                { key: 'externalFunding', label: 'מימון חיצוני (חיה)', color: '#7c3aed' },
                { key: 'livingCosts', label: 'הוצאות קבועות', color: '#7f1d1d' },
                { key: 'debtsMonthly', label: 'חובות חודשי', color: '#7f1d1d' },
                { key: 'debtsOneTime', label: 'חובות חד פעמי', color: '#7f1d1d' },
                { key: 'university', label: 'אוניברסיטה', color: '#7f1d1d' },
                { key: 'cryptoLife', label: 'מחייה מקריפטו', color: '#5b21b6' },
                { key: 'investments', label: 'קרן השקעות', color: '#92400e' },
              ];

              // Map goal month names to cashflow indices
              const goalMonthToCfIdx = {
                'פברואר': 0, 'מרץ': 1, 'אפריל': 2, 'מאי': 3, 'יוני': 4,
                'יולי': 5, 'אוגוסט': 6, 'ספטמבר': 7, 'אוקטובר': 8, 'נובמבר': 9, 'דצמבר': 10
              };

              // Get the crypto gap for a 2026 month
              // For future months (have auto-calc): read the stored "השלמת הכנסה נדרשת" value
              // For current/past months: compute framework gap + abroad net directly
              const getCashflowGap = (goalMonth) => {
                if (!goalMonth.includes('2026')) return null;
                const monthName = goalMonth.replace(/ \d{4}$/, '');
                const cfIdx = goalMonthToCfIdx[monthName];
                if (cfIdx == null || !cashflowData.months[cfIdx]) return null;
                const m = cashflowData.months[cfIdx];
                const BANK_FRAMEWORK = -23500;
                const currentRealMonth = new Date().getMonth(); // 0=Jan
                const currentMonthIdx = currentRealMonth - 1; // cashflow: 0=Feb

                // For future months: read the stored auto-calc supplement directly
                if (cfIdx > currentMonthIdx) {
                  let autoCalcAmount = 0;
                  for (const w of m.weeks) {
                    const ac = w.items.find(i => i.sourceAutoCalc);
                    if (ac) {
                      autoCalcAmount = ac.actual != null ? ac.actual : (ac.planned || 0);
                      break;
                    }
                  }
                  return autoCalcAmount > 0 ? -autoCalcAmount : 0;
                }

                // For current/past months: compute directly (same logic as dashboard)
                const ob = m.openingBalance || 0;
                // IL income WITHOUT autoCalc (to show true gap)
                const ilInc = m.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'israel' && !i.sourceAutoCalc).reduce((ss, i) => ss + (i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
                const ilExp = m.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region === 'israel').reduce((ss, i) => ss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
                const endBalance = ob + ilInc - ilExp;
                const frameworkGap = endBalance - BANK_FRAMEWORK;

                // Abroad net
                const thItemsInc = m.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'thailand').reduce((ss, i) => ss + (i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
                const thSourcesInc = getThSources(cfIdx).reduce((s, src) => s + (src.ils || 0), 0);
                const thExp = m.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region === 'thailand').reduce((ss, i) => ss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
                const thNet = (thItemsInc + thSourcesInc) - thExp;

                const totalGap = frameworkGap + thNet;
                return totalGap < 0 ? totalGap : 0; // only show negative gaps (need crypto)
              };

              // Pull income from cashflow for 2026 months
              const getCfIncome = (goalMonth, person) => {
                if (!goalMonth.includes('2026')) return null; // only for 2026
                const monthName = goalMonth.replace(/ \d{4}$/, '');
                const cfIdx = goalMonthToCfIdx[monthName];
                if (cfIdx == null || !cashflowData.months[cfIdx]) return null;
                const m = cashflowData.months[cfIdx];
                const prefix = person === 'kfir' ? 'הכנסה כפיר' : 'הכנסה עדי';
                let total = 0;
                m.weeks.forEach(w => {
                  w.items.forEach(item => {
                    if (item.type === 'income' && item.description.startsWith(prefix)) {
                      total += (item.actual != null ? item.actual : (item.planned || 0));
                    }
                  });
                });
                return total;
              };

              // Rent income: 10,500 per month from מרץ 2026 to יוני 2027
              const rentMonths = [
                'מרץ 2026','אפריל 2026','מאי 2026','יוני 2026','יולי 2026','אוגוסט 2026',
                'ספטמבר 2026','אוקטובר 2026','נובמבר 2026','דצמבר 2026',
                'ינואר 2027','פברואר 2027','מרץ 2027','אפריל 2027','מאי 2027','יוני 2027'
              ];

              // Pull monthly debts total from debts tab (הלוואות ארוכות טווח)
              const getTotalMonthlyDebts = () => {
                return debtsData.debts2027.reduce((s, i) => s + Math.abs(i.monthlyPayment || 0), 0);
              };

              // Calculate total remaining to pay on all loans FROM a target month until end
              // Same logic as calcAdjustedILS but from target month perspective
              const getDebtPayoffAtMonth = (goalMonth) => {
                const monthNames = {'ינואר':0,'פברואר':1,'מרץ':2,'אפריל':3,'מאי':4,'יוני':5,'יולי':6,'אוגוסט':7,'ספטמבר':8,'אוקטובר':9,'נובמבר':10,'דצמבר':11};
                const parts = goalMonth.match(/(\S+)\s+(\d{4})/);
                if (!parts) return 0;
                const targetDate = new Date(parseInt(parts[2]), monthNames[parts[1]] || 0, 1);

                let total = 0;
                debtsData.debts2027.forEach(debt => {
                  const monthly = Math.abs(debt.monthlyPayment || 0);

                  if (!debt.endDate || !monthly) {
                    // No end date or no monthly - use static amount
                    total += (debt.amountILS || 0);
                    return;
                  }

                  const end = new Date(debt.endDate);
                  if (end <= targetDate) return; // already fully paid by target month

                  // Months remaining from target month to end date
                  const monthsLeft = Math.max(0, (end.getFullYear() - targetDate.getFullYear()) * 12 + (end.getMonth() - targetDate.getMonth()));
                  total += monthsLeft * monthly * -1;
                });
                return total; // negative number = total left to pay
              };


              // Get effective value for a row field
              const getEffective = (row, key) => {
                // If user manually overrode, use stored value
                if (row['_override_' + key]) return row[key] || 0;
                if (key === 'incomeRent') {
                  return rentMonths.includes(row.month) ? 10500 : (row.incomeRent || 0);

                if (key === 'incomeKfir' && row.month.includes('2026')) {
                  const cf = getCfIncome(row.month, 'kfir');

                if (key === 'incomeAdi' && row.month.includes('2026')) {
                  const cf = getCfIncome(row.month, 'adi');
                  if (cf != null) return cf;

                if (key === 'externalFunding' && row.month.includes('2026')) {

                  const monthName = row.month.replace(/ \d{4}$/, '');
                  const repayments = debtsData.repaymentPlan.filter(r => r.month === monthName);
                  if (repayments.length > 0) {
                    return Math.abs(repayments.reduce((s, r) => s + (r.amountILS || 0), 0));
                  }
                }

                if (key === 'debtsMonthly') {
                  if (row.month.includes('2026')) {
                    const total = getTotalMonthlyDebts();
                    return total > 0 ? -total : total; // ensure negative (expense)
                  }
                  if (row.month === 'יוני 2027') {
                    // Lump-sum payoff: remaining balance of all loans at June 2027
                    return getDebtPayoffAtMonth(row.month);
                  }
                }
                if (key === 'livingCosts') {
                  // Total fixed expenses MINUS debts that are already in debtsMonthly column
                  const totalFixedIL = fixedExpenses.reduce((s, i) => s + (i.amount || 0), 0);
                  const totalFixedAbroad = fixedExpensesAbroad.reduce((s, i) => s + (i.amount || 0), 0);
                  const debtsInFixed = getTotalMonthlyDebts(); // these are already counted in debtsMonthly
                  return totalFixedIL + totalFixedAbroad + debtsInFixed; // debtsInFixed is positive, adds back the deducted amount
                }
                // Auto-populate crypto life from יוני 2026 (LOW- only until יוני 2027, rest over full period)
                if (key === 'cryptoLife' && isCryptoLifeMonth(row.month)) {
                  return Math.round(getCryptoLifeMonthlyILS(row.month));
                }
                if (key === 'investments' && (row.month.includes('2027') || row.month.includes('2028'))) {
                  return Math.round(investFundMonthlyILS); // display only - not in gap calc
                }
                return row[key] || 0;
              };

              const isCfLinked = (row, key) => {
                if (row['_override_' + key]) return false;
                if (key === 'incomeRent' && rentMonths.includes(row.month)) return true;
                if (row.month.includes('2026') && (key === 'incomeAdi' || key === 'incomeKfir')) return true;
                if (row.month.includes('2026') && key === 'externalFunding') return true;
                if (key === 'debtsMonthly' && (row.month.includes('2026') || row.month === 'יוני 2027')) return true;
                if (key === 'livingCosts') return true;
                // Auto-linked crypto allocations
                if (key === 'cryptoLife' && isCryptoLifeMonth(row.month)) return true;
                if (key === 'investments' && (row.month.includes('2027') || row.month.includes('2028'))) return true;

              // Helper: check if month is >= יוני 2026 (crypto life starts from June 2026)
              const cryptoLifeStartMonths2026 = ['יוני 2026','יולי 2026','אוגוסט 2026','ספטמבר 2026','אוקטובר 2026','נובמבר 2026','דצמבר 2026'];
              const isCryptoLifeMonth = (m) => cryptoLifeStartMonths2026.includes(m) || m.includes('2027') || m.includes('2028');
              // LOW- months: יוני 2026 - יוני 2027
              const lowMinusMonths2027 = ['ינואר 2027','פברואר 2027','מרץ 2027','אפריל 2027','מאי 2027','יוני 2027'];
              const isLowMinusMonth = (m) => cryptoLifeStartMonths2026.includes(m) || lowMinusMonths2027.includes(m);

              // Split crypto life using 2026 vs 2027+ profit distributions
              const totalLowMinusSales = Object.values(profitBreakdown).reduce((s, b) => s + b.salesLowMinus, 0);
              const lowMinusFilterOn = portfolioSummary.length > 0 && portfolioSummary.every(c => (getLevelFilter(c.symbol))['LOW-']);
              const lowMinusNeto = lowMinusFilterOn ? totalLowMinusSales * (1 - profitDistribution2026.tax / 100) : 0;
              const otherNeto = filteredNeto - lowMinusNeto;

              const numLowMinusMonths = goalsData.filter(r => isLowMinusMonth(r.month)).length || 1;
              const allCryptoLifeMonths = goalsData.filter(r => isCryptoLifeMonth(r.month));
              const numAllCryptoLifeMonths = allCryptoLifeMonths.length || 1;
              const num2026CryptoMonths = goalsData.filter(r => cryptoLifeStartMonths2026.includes(r.month)).length || 1;

              // 2026: LOW- gets 50% life (profitDistribution2026), spread over 13 months (June 2026 - June 2027)
              const lowMinusLifeMonthlyUSD = (lowMinusNeto * profitDistribution2026.life / 100) / numLowMinusMonths;
              // 2027+: other levels get 25% life (profitDistribution), spread over full period
              const otherLifeMonthlyUSD = (otherNeto * profitDistribution.life / 100) / numAllCryptoLifeMonths;

              // Per-month crypto life calculation
              const getCryptoLifeMonthlyILS = (month) => {
                const usdToILS = effectiveUsdToILS || 3.6;
                if (isLowMinusMonth(month)) {
                  return (lowMinusLifeMonthlyUSD + otherLifeMonthlyUSD) * usdToILS;
                }
                return otherLifeMonthlyUSD * usdToILS;
              };
              // Backward compat: average for display purposes
              const cryptoLifeMonthlyUSD = (lowMinusNeto * profitDistribution2026.life / 100 + otherNeto * profitDistribution.life / 100) / numAllCryptoLifeMonths;
              const cryptoLifeMonthlyILS = cryptoLifeMonthlyUSD * (effectiveUsdToILS || 3.6);

              // Investment fund: only from 2027+ NETO (otherNeto), starts from ינואר 2027
              const months2027_2028 = goalsData.filter(r => r.month.includes('2027') || r.month.includes('2028'));
              const numMonths2027_2028 = months2027_2028.length || 1;

              const incomeKeys = ['incomeRent', 'incomeAdi', 'incomeKfir', 'awareness', 'arbitration', 'externalFunding', 'cryptoLife'];
              const expenseKeys = ['livingCosts', 'debtsMonthly', 'debtsOneTime', 'university'];
              const displayOnlyKeys = ['investments']; // shown in table but NOT included in gap calculation
              const updateGoal = (idx, key, val) => {
                const updated = [...goalsData];

                  updated[idx] = { ...updated[idx], [key]: val };

                  let v = parseFloat(val) || 0;

                setGoalsData(updated);

              const yearGroups = [
                { year: '2026', rows: goalsData.filter(r => r.month.includes('2026')) },

              // Fields WITHOUT cryptoLife and investments for the gap calculation
              // investments = display only (comes from crypto NETO, not from monthly cashflow)
              const gapFields = fields.filter(f => f.key !== 'cryptoLife' && f.key !== 'investments');

              const calcRowTotal = (row) => {
                // For 2026: gap from cashflow + external funding (חיה) which is not in cashflow
                const cfGap = getCashflowGap(row.month);
                if (cfGap != null) {
                  // Add external funding (positive income, reduces negative gap)
                  const extFunding = getEffective(row, 'externalFunding');
                  return cfGap + extFunding; // cfGap is negative, extFunding is positive
                }
                // For 2027+: sum all fields EXCEPT cryptoLife (shown separately)
                return gapFields.reduce((s, f) => s + getEffective(row, f.key), 0);
              };

              const calcRowTotalWithLife = (row) => {
                return calcRowTotal(row) + getEffective(row, 'cryptoLife');

                fields.forEach(f => { totals[f.key] = rows.reduce((s, r) => s + getEffective(r, f.key), 0); });

                return totals;
              };

              const grandTotals = calcYearTotals(goalsData);

              return (
                <div>
                  <h2 className="text-xl font-bold text-cyan-400 mb-4">תכנית יעדים לבית 2026-2028</h2>

                  {(() => {

                    const ils = (usd) => <span className="text-gray-500"> ({fmt(usd * r, 0)} ש"ח)</span>;
                    const ilsB = (usd) => <span className="text-gray-500 font-normal"> ({fmt(usd * r, 0)} ש"ח)</span>;
                    return (
                  <div className="bg-gray-800 border border-gray-700 rounded-lg p-3 mb-4 text-xs text-gray-300 space-y-1">
                    <div className="font-bold text-cyan-400 mb-1">מפתח חישוב הכנסות מקריפטו <span className="text-gray-500 font-normal">(שער: {r.toFixed(2)} ש"ח/$)</span></div>
                    <div><span className="text-lime-400 font-bold">2026 (LOW-):</span> {profitDistribution2026.tax}% מס, {profitDistribution2026.life}% מחייה, {profitDistribution2026.reinvest}% השקעה חוזרת. NETO: {fmtC(lowMinusNeto)}{ils(lowMinusNeto)} {!lowMinusFilterOn && <span className="text-red-400">(LOW- כבוי)</span>}</div>
                    <div className="pr-4"><span className="text-orange-400">LOW- מחייה</span> ({profitDistribution2026.life}%) נפרס על יוני 2026 - יוני 2027 ({numLowMinusMonths} חודשים) = <b>{fmtC(lowMinusLifeMonthlyUSD)}</b>{ilsB(lowMinusLifeMonthlyUSD)}/חודש</div>
                    <div><span className="text-blue-400 font-bold">2027+:</span> {profitDistribution.tax}% מס, {profitDistribution.life}% מחייה, {profitDistribution.reinvest}% השקעה חוזרת, {profitDistribution.investmentFund}% קרן השקעות. NETO: {fmtC(otherNeto)}{ils(otherNeto)}</div>
                    <div className="pr-4"><span className="text-green-400">שאר הרמות מחייה</span> ({profitDistribution.life}%) נפרס על יוני 2026 - דצמבר 2028 ({numAllCryptoLifeMonths} חודשים) = <b>{fmtC(otherLifeMonthlyUSD)}</b>{ilsB(otherLifeMonthlyUSD)}/חודש</div>
                    <div className="pr-4 text-gray-500">יוני-דצמבר 26: <b className="text-white">{fmtC(lowMinusLifeMonthlyUSD + otherLifeMonthlyUSD)}</b>{ilsB(lowMinusLifeMonthlyUSD + otherLifeMonthlyUSD)}/חודש | ינואר-יוני 27: <b className="text-white">{fmtC(lowMinusLifeMonthlyUSD + otherLifeMonthlyUSD)}</b>{ilsB(lowMinusLifeMonthlyUSD + otherLifeMonthlyUSD)}/חודש | יולי 27+: <b className="text-white">{fmtC(otherLifeMonthlyUSD)}</b>{ilsB(otherLifeMonthlyUSD)}/חודש</div>
                    <div><span className="text-purple-400">קרן השקעות:</span> {profitDistribution.investmentFund}% מ-NETO 2027+, מינואר 2027 ({numMonths2027_2028} חודשים) = <b>{fmtC(investFundMonthlyUSD)}</b>{ilsB(investFundMonthlyUSD)}/חודש <span className="text-gray-500">(לתצוגה בלבד, לא בחישוב פער). אין קרן השקעות ב-2026.</span></div>
                  </div>
                    );
                  })()}

                  <div className="overflow-x-auto goals-scroll">

                          {fields.map(f => (
                            <th key={f.key} className="border border-gray-700 px-1 py-1 text-center" style={{ minWidth: '80px', background: f.color }}>{f.label}</th>
                          ))}
                          <th className="border border-gray-700 px-1 py-1 text-center bg-purple-900" style={{ minWidth: '100px' }}>פער ללא מחייה ש"ח</th>

                          <th className="border border-gray-700 px-1 py-1 text-center bg-green-900" style={{ minWidth: '100px' }}>פער אחרי מחייה $</th>

                      <tbody>
                        {yearGroups.map(({ year, rows }) => {
                          const yearTotals = calcYearTotals(rows);
                          return (

                              <tr><td colSpan={fields.length + 7} className="bg-gray-700 text-cyan-300 font-bold text-center py-1 border border-gray-600">{year}</td></tr>
                              {rows.map((row) => {
                                const globalIdx = goalsData.indexOf(row);
                                const rowTotal = calcRowTotal(row);
                                const gapUSD = rowTotal / (effectiveUsdToILS || 3.6);
                                return (
                                  <tr key={row.month} className="hover:bg-gray-800/50">
                                    <td className="border border-gray-700 px-2 py-1 text-right font-medium sticky right-0 bg-gray-900 z-10">{row.month.replace(/ \d{4}$/, '')}</td>
                                    {fields.map(f => {
                                      const linked = isCfLinked(row, f.key);
                                      const val = getEffective(row, f.key);
                                      return (
                                        <td key={f.key} className="border border-gray-700 p-0" title={linked ? 'נמשך אוטומטית - לחץ פעמיים לדריסה' : ''}>
                                          <NumInput
                                            value={val}
                                            showZero={true}
                                            onChange={e => {
                                              const newVal = e.target.value;
                                              if (linked) {

                                                const updated = [...goalsData];
                                                let v = parseFloat(newVal) || 0;
                                                if (incomeKeys.includes(f.key) && v < 0) v = Math.abs(v);

                              {coin.current > 0 && coin.ath > 0 && coin.current < coin.ath ? `+${(((coin.ath / coin.current) - 1) * 100).toFixed(0)}%` : coin.current >= coin.ath && coin.ath > 0 ? 'ATH!' : '-'}

                              <select value={coin.status} onChange={(e) => updateCoin(coin.symbol, 'status', e.target.value)}

                              <input type="text" value={coin.note || ''} onChange={(e) => updateCoin(coin.symbol, 'note', e.target.value)}

                            <td className="px-3 py-2 text-center flex gap-1 justify-center">

                              <button onClick={() => removeCoin(coin.symbol)} className="px-2 py-1 bg-red-700 hover:bg-red-800 rounded text-xs text-white">X</button>

                          </tr>

                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })()}

            {/* ========== TAB: TRANSACTIONS ========== */}
            {activeTab === 'transactions' && (() => {
              const filteredTxs = transactions
                .filter(t => !txFilterCoin || t.coin === txFilterCoin)
                .filter(t => !txFilterType || t.type === txFilterType)
                .filter(t => !txFilterWallet || t.wallet === txFilterWallet)
                .filter(t => {
                  if (!txSearch) return true;
                  const s = txSearch.toUpperCase().trim();
                  // Exact coin match takes priority
                  if (t.coin === s) return true;
                  // Partial coin match
                  if (t.coin.includes(s)) return true;
                  // Wallet match
                  if (t.wallet.toLowerCase().includes(txSearch.toLowerCase())) return true;
                  // Note match - but skip DCA auto-generated notes to avoid showing USDC withdrawals for coin searches
                  const note = (t.note || '').toLowerCase();
                  if (note && !note.startsWith('dca ') && note.includes(txSearch.toLowerCase())) return true;
                  return false;
                });

              const sortedTxs = [...filteredTxs].sort((a, b) => {
                let av = a[txSortColumn], bv = b[txSortColumn];
                if (txSortColumn === 'date') { av = new Date(a.date); bv = new Date(b.date); }
                if (txSortDesc) return av > bv ? -1 : av < bv ? 1 : 0;
                return av < bv ? -1 : av > bv ? 1 : 0;
              });

              const summary = {
                count: filteredTxs.length,
                buyTotal: filteredTxs.filter(t => t.type === 'Buy').reduce((s, t) => s + t.total, 0),
                sellTotal: filteredTxs.filter(t => t.type === 'Sell').reduce((s, t) => s + t.total, 0),
              };
              summary.net = summary.buyTotal - summary.sellTotal;
              // Per-coin holdings: buys + deposits - sells - withdrawals
              const coinHoldings = {};
              filteredTxs.forEach(t => {
                if (!coinHoldings[t.coin]) coinHoldings[t.coin] = 0;
                if (t.type === 'Buy' || t.type === 'Deposit') coinHoldings[t.coin] += t.amount;
                else if (t.type === 'Sell' || t.type === 'Withdrawal') coinHoldings[t.coin] -= t.amount;
              });
              const holdingsEntries = Object.entries(coinHoldings).filter(([_, v]) => v !== 0);

              const coinOptions = [...new Set(transactions.map(t => t.coin))].sort();
              const typeOptions = ['Buy', 'Sell', 'Deposit', 'Withdrawal'];

              return (
                <div className="space-y-4">
                  {/* Legend + Filters */}
                  <div className="bg-gray-800 rounded-lg p-3 space-y-3">

                      <span><b className="text-green-400">Buy</b> = קנייה בכסף אמיתי (פיאט)</span>
                      <span><b className="text-blue-400">Deposit</b> = הפקדה / המרה מקריפטו אחר</span>
                      <span><b className="text-red-400">Sell</b> = מכירה לכסף אמיתי (פיאט)</span>
                      <span><b className="text-yellow-400">Withdrawal</b> = המרה לקריפטו / העברה / גניבה</span>
                    </div>
                    <div className="flex gap-2 flex-wrap items-center">
                      <select value={txFilterCoin} onChange={(e) => { setTxFilterCoin(e.target.value); setTxSearch(''); }}

                        {coinOptions.map(c => <option key={c} value={c}>{c}</option>)}

                      <select value={txFilterType} onChange={(e) => setTxFilterType(e.target.value)}
                        className="px-2 py-1 bg-gray-700 text-white rounded text-sm">
                        <option value="">כל הסוגים</option>
                        {typeOptions.map(t => <option key={t} value={t}>{t}</option>)}
                      </select>
                      <select value={txFilterWallet} onChange={(e) => setTxFilterWallet(e.target.value)}
                        className="px-2 py-1 bg-gray-700 text-white rounded text-sm">
                        <option value="">כל הארנקים</option>
                        {allWalletOptions.map(w => <option key={w} value={w}>{w}</option>)}
                      </select>
                      <button onClick={() => setEditingTx({ id: null, coin: txFilterCoin || '', type: 'Buy', wallet: 'MEXC', date: new Date().toISOString().slice(0,10), amount: 0, avgPrice: 0, total: 0, note: '', _newCoinGeckoId: '' })}
                        className="px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-white text-sm font-semibold">+ הוסף טרנזקציה</button>
                      <button onClick={() => exportCSV(sortedTxs, 'transactions.csv')}
                        className="px-3 py-1 bg-cyan-600 hover:bg-cyan-700 rounded text-white text-sm font-semibold">Google Sheets</button>
                      <input type="text" placeholder="חיפוש..." value={txSearch} onChange={(e) => setTxSearch(e.target.value)}
                        className="flex-1 min-w-32 px-2 py-1 bg-gray-700 text-white rounded text-sm" />
                    </div>
                  </div>

                  {/* Add/Edit Form */}
                  {editingTx && (
                    <div id="txEditForm" className="bg-gray-800 border border-cyan-700 rounded-lg p-4 space-y-3">
                      <div className="flex justify-between items-center">
                        <h4 className="text-lg font-bold text-cyan-400">{editingTx.id ? 'עריכת טרנזקציה' : 'טרנזקציה חדשה'}</h4>
                        <button onClick={() => setEditingTx(null)} className="text-gray-400 hover:text-white text-xl">×</button>
                      </div>
                      <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <div>
                          <label className="text-xs text-gray-400">מטבע (הקלד סימול — גם חדש)</label>
                          <input type="text" value={editingTx.coin}
                            onChange={(e) => setEditingTx({...editingTx, coin: e.target.value.toUpperCase()})}
                            placeholder="USDC, SOL..."
                            list="coinSymbolList"
                            className="w-full bg-gray-700 text-white px-2 py-1 rounded text-sm" />
                          <datalist id="coinSymbolList">
                            {coins.map(c => <option key={c.symbol} value={c.symbol} />)}
                          </datalist>
                          {editingTx.coin && !coins.find(c => c.symbol === editingTx.coin) && (
                            <div className="mt-1 p-2 bg-gray-900 border border-yellow-700 rounded text-xs">

                              <input type="text" placeholder="usd-coin, solana..."

                            </div>

                        </div>
                        <div>

                              <button onClick={() => { if (newWalletName.trim()) { const w = newWalletName.trim(); addNewWallet(w); setEditingTx(prev => ({...prev, wallet: w})); } }}

                              <button onClick={() => { setShowAddWallet(false); setNewWalletName(''); }}
                                className="px-2 py-1 bg-gray-600 hover:bg-gray-500 rounded text-white text-xs">X</button>
                            </div>
                          ) : (
                            <div className="flex gap-1">
                              <select value={editingTx.wallet} onChange={(e) => {
                                if (e.target.value === '__ADD_NEW__') { setShowAddWallet(true); setNewWalletName(''); }
                                else setEditingTx({...editingTx, wallet: e.target.value});
                              }} className="flex-1 bg-gray-700 text-white px-2 py-1 rounded text-sm">
                                <option value="">-- בחר ארנק --</option>
                                {allWalletOptions.map(w => <option key={w} value={w}>{w}</option>)}
                                <option value="__ADD_NEW__">+ הוסף ארנק חדש...</option>
                              </select>
                            </div>
                          )}
                        </div>
                        <div>
                          <label className="text-xs text-gray-400">תאריך</label>
                          <input type="date" value={editingTx.date} onChange={(e) => setEditingTx({...editingTx, date: e.target.value})}
                            className="w-full bg-gray-700 text-white px-2 py-1 rounded text-sm" />
                        </div>
                        <div>
                          <label className="text-xs text-gray-400">כמות</label>
                          <input type="number" step="any" value={editingTx.amount} onChange={(e) => {
                            const amount = parseFloat(e.target.value) || 0;
                            setEditingTx({...editingTx, amount, total: amount * editingTx.avgPrice});
                          }} className="w-full bg-gray-700 text-white px-2 py-1 rounded text-sm" />
                        </div>
                        <div>
                          <label className="text-xs text-gray-400">מחיר ממוצע ($)</label>
                          <input type="number" step="any" value={editingTx.avgPrice} onChange={(e) => {
                            const avgPrice = parseFloat(e.target.value) || 0;
                            setEditingTx({...editingTx, avgPrice, total: avgPrice * editingTx.amount});
                          }} className="w-full bg-gray-700 text-white px-2 py-1 rounded text-sm" />
                        </div>
                        <div>
                          <label className="text-xs text-gray-400">סה"כ ($)</label>
                          <input type="number" step="any" value={editingTx.total} onChange={(e) => setEditingTx({...editingTx, total: parseFloat(e.target.value) || 0})}
                            className="w-full bg-gray-700 text-white px-2 py-1 rounded text-sm" />
                        </div>
                        <div>
                          <label className="text-xs text-gray-400">הערות</label>
                          <input type="text" value={editingTx.note || ''} onChange={(e) => setEditingTx({...editingTx, note: e.target.value})}
                            placeholder="הערה חופשית..."
                            className="w-full bg-gray-700 text-white px-2 py-1 rounded text-sm" />
                        </div>
                        <div className="flex items-end gap-2">
                          <button onClick={() => {
                            const sym = (editingTx.coin || '').trim().toUpperCase();
                            if (!sym) { alert('הזן סימול מטבע'); return; }
                            const computed = { ...editingTx, coin: sym };
                            // Auto-calc amount if left at 0 but total and avgPrice exist
                            if ((!computed.amount || computed.amount === 0) && computed.total > 0 && computed.avgPrice > 0) {
                              computed.amount = parseFloat((computed.total / computed.avgPrice).toFixed(8));
                            }
                            const txToSave = computed;
                            delete txToSave._newCoinGeckoId;
                            // If new coin — register it in coinMeta for live pricing
                            if (!coins.find(c => c.symbol === sym)) {
                              const cgId = (editingTx._newCoinGeckoId || coinGeckoIds[sym] || '').trim();
                              updateCoinMeta(sym, { status: 'active', coingeckoId: cgId });
                            }
                            if (editingTx.id != null && editingTx.id !== '') {
                              updateTransaction(editingTx.id, txToSave);
                            } else {
                              addTransaction(txToSave);
                            }
                            setEditingTx(null);
                          }} className="flex-1 px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-white text-sm font-semibold">שמור</button>
                          <button onClick={() => setEditingTx(null)} className="px-3 py-1 bg-gray-600 hover:bg-gray-700 rounded text-white text-sm">ביטול</button>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* Summary */}
                  <div className="bg-gray-800 rounded-lg p-3 flex flex-wrap gap-4 text-sm">
                    <span>סה"כ טרנזקציות: <b className="text-cyan-400">{summary.count}</b></span>
                    <span>סה"כ קנייות: <b className="text-green-400">{fmtC(summary.buyTotal)}</b></span>
                    <span>סה"כ מכירות: <b className="text-red-400">{fmtC(summary.sellTotal)}</b></span>
                    <span>נטו: <b className={summary.net >= 0 ? 'text-green-400' : 'text-red-400'}>{fmtC(summary.net)}</b></span>
                  </div>
                  {/* Selected coin info */}
                  {txFilterCoin && (() => {
                    const coinData = portfolioSummary.find(c => c.symbol === txFilterCoin);
                    const price = currentPrices[txFilterCoin] || 0;
                    const coins = coinData ? coinData.coins : 0;
                    const value = coins * price;
                    const avgBuy = coinData ? coinData.avgBuy : 0;
                    const profitPct = avgBuy > 0 ? ((price / avgBuy) - 1) * 100 : 0;
                    const ath = coinData ? (coinData.ath || 0) : 0;
                    return (
                      <div className="bg-gray-900 rounded-lg p-3 border border-cyan-800 flex flex-wrap gap-5 items-center text-sm">
                        <span className="text-lg font-bold text-cyan-400">{txFilterCoin}</span>
                        <span>מחיר נוכחי: <b className="text-yellow-400">{fmtC(price)}</b></span>
                        <span>כמות: <b className="text-white">{coins.toLocaleString('en-US', {maximumFractionDigits: 2})}</b></span>
                        <span>שווי תיק: <b className="text-green-400">{fmtC(value)}</b></span>
                        <span>מחיר קנייה ממוצע: <b className="text-gray-300">{fmtC(avgBuy)}</b></span>
                        <span>רווח/הפסד: <b className={profitPct >= 0 ? 'text-green-400' : 'text-red-400'}>{profitPct >= 0 ? '+' : ''}{profitPct.toFixed(1)}%</b></span>
                        {ath > 0 && <span>ATH: <b className="text-purple-400">{fmtC(ath)}</b></span>}
                      </div>
                    );
                  })()}
                  {/* Per-coin current holdings */}
                  {holdingsEntries.length > 0 && (
                    <div className="bg-gray-800 rounded-lg p-3">
                      <div className="text-xs text-gray-400 mb-2">כמות מטבעות עדכנית (לפי טרנזקציות מסוננות)</div>
                      <div className="flex flex-wrap gap-3 text-sm">
                        {holdingsEntries.map(([sym, qty]) => {
                          const price = currentPrices[sym] || 0;
                          const value = qty * price;
                          return (
                            <div key={sym} className="bg-gray-900 border border-gray-700 rounded px-3 py-2 flex flex-col items-center min-w-28">
                              <div className="text-cyan-300 font-bold">{sym}</div>
                              <div className="text-white font-semibold">{fmt(qty)} <span className="text-gray-500 text-xs">מטבעות</span></div>
                              {price > 0 && (
                                <>
                                  <div className="text-gray-400 text-xs">מחיר: ${price < 1 ? price.toFixed(6) : price.toFixed(4)}</div>
                                  <div className="text-green-400 font-bold text-xs">שווי: {fmtC(value)}</div>
                                </>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Table */}
                  <div className="mobile-scroll">
                    <table className="w-full text-sm">
                      <thead className="bg-gray-800 border-b border-gray-700">
                        <tr>
                          <th className="px-3 py-2 text-right cursor-pointer hover:text-cyan-400" onClick={() => { setTxSortColumn('coin'); setTxSortDesc(txSortColumn === 'coin' ? !txSortDesc : true); }}>מטבע</th>
                          <th className="px-3 py-2 text-right cursor-pointer hover:text-cyan-400" onClick={() => { setTxSortColumn('type'); setTxSortDesc(txSortColumn === 'type' ? !txSortDesc : true); }}>סוג</th>
                          <th className="px-3 py-2 text-right cursor-pointer hover:text-cyan-400" onClick={() => { setTxSortColumn('wallet'); setTxSortDesc(txSortColumn === 'wallet' ? !txSortDesc : true); }}>ארנק</th>
                          <th className="px-3 py-2 text-right cursor-pointer hover:text-cyan-400" onClick={() => { setTxSortColumn('date'); setTxSortDesc(txSortColumn === 'date' ? !txSortDesc : true); }}>תאריך</th>
                          <th className="px-3 py-2 text-right cursor-pointer hover:text-cyan-400" onClick={() => { setTxSortColumn('amount'); setTxSortDesc(txSortColumn === 'amount' ? !txSortDesc : true); }}>כמות</th>
                          <th className="px-3 py-2 text-right cursor-pointer hover:text-cyan-400" onClick={() => { setTxSortColumn('avgPrice'); setTxSortDesc(txSortColumn === 'avgPrice' ? !txSortDesc : true); }}>מחיר ממוצע ($)</th>
                          <th className="px-3 py-2 text-right cursor-pointer hover:text-cyan-400" onClick={() => { setTxSortColumn('total'); setTxSortDesc(txSortColumn === 'total' ? !txSortDesc : true); }}>סה"כ ($)</th>

                      <tbody className="divide-y divide-gray-700">

                            <td className="px-3 py-2 font-bold text-cyan-300">{tx.coin}</td>

                            <td className="px-3 py-2 text-sm">{fmt(tx.amount)}</td>
                            <td className="px-3 py-2 text-sm">{tx.avgPrice.toFixed(6)}</td>

                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })()}

            {/* ========== TAB: WALLETS ========== */}
            {activeTab === 'wallets' && (() => {
              const chartColors = ['#06b6d4','#22c55e','#eab308','#f97316','#ef4444','#a855f7','#ec4899','#14b8a6','#6366f1','#84cc16','#f43f5e','#0ea5e9','#d946ef','#fb923c','#4ade80','#facc15'];
              const walletValues = walletSummary.map(w => w.currentValue);
              const maxWalletValue = walletValues.length > 0 ? Math.max(...walletValues) : 1;
              let cumulativeAngle = 0;
              const walletPieSlices = walletSummary.map((w, i) => {
                const pct = walletValues.reduce((s) => s, 0) > 0 ? (w.currentValue / walletValues.reduce((s, v) => s + v)) * 100 : 0;
                const angle = (pct / 100) * 360;
                const startAngle = cumulativeAngle;
                cumulativeAngle += angle;
                const midAngle = startAngle + angle / 2;
                const startRad = (startAngle - 90) * Math.PI / 180;
                const endRad = (startAngle + angle - 90) * Math.PI / 180;
                const midRad = (midAngle - 90) * Math.PI / 180;
                const largeArc = angle > 180 ? 1 : 0;

            {/* ========== TAB: CASHFLOW ========== */}

              const monthRaw = cashflowData.months[cfSelectedMonth];

              const month = monthRaw;

              // Dynamic opening balance: current month (based on real date) uses stored value,
              // future months are calculated from previous month's opening + Israel net
              const currentRealMonth = new Date().getMonth(); // 0=Jan, 4=May
              const currentMonthIdx = currentRealMonth - 1; // cashflow array: 0=Feb, 3=May, etc.

              // Helper: compute Israel net for a given month
              // For current month: only remaining items (opening = current status, already reflects paid)
              const calcILNet = (m, mIdx) => {
                if (!m || !m.weeks) return 0;
                if (mIdx === currentMonthIdx) {
                  const inc = m.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'israel' && i.actual == null).reduce((ss, i) => ss + (i.planned || 0), 0), 0);
                  const exp = m.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region === 'israel' && i.actual == null).reduce((ss, i) => ss + Math.abs(i.planned || 0), 0), 0);
                  return inc - exp;
                }
                const inc = m.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'israel').reduce((ss, i) => ss + (i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
                const exp = m.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region === 'israel').reduce((ss, i) => ss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
                return inc - exp;
              };

              const getOpeningBalance = (monthIdx) => {
                if (monthIdx <= currentMonthIdx) {
                  // Current or past month - use stored value
                  return cashflowData.months[monthIdx]?.openingBalance || 0;
                }
                // Future month - calculate from chain
                const prevBal = getOpeningBalance(monthIdx - 1);
                const prevMonth = cashflowData.months[monthIdx - 1];
                return prevBal + calcILNet(prevMonth, monthIdx - 1);
              };

              const effectiveOpeningBalance = getOpeningBalance(cfSelectedMonth);

              // Determine if this is the current month (where opening balance = current bank status)
              const isCurrentMonth = cfSelectedMonth <= currentMonthIdx;

              // === ALL items totals INCLUDING autoCalc (for dashboard gap display - shows status AFTER planned supplement) ===
              const ilAllIncome = month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'israel').reduce((ss, i) => ss + (i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
              const ilAllExpenses = month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region === 'israel').reduce((ss, i) => ss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0);

              // === REMAINING items only (unpaid/unreceived - for current month balance calculation) ===
              const ilRemainingIncome = month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'israel' && i.actual == null).reduce((ss, i) => ss + (i.planned || 0), 0), 0);
              const ilRemainingExpenses = month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region === 'israel' && i.actual == null).reduce((ss, i) => ss + Math.abs(i.planned || 0), 0), 0);
              const ilPaidExpenses = month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region === 'israel' && i.actual != null).reduce((ss, i) => ss + Math.abs(i.actual), 0), 0);
              const ilReceivedIncome = month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'israel' && i.actual != null).reduce((ss, i) => ss + i.actual, 0), 0);

              // For current month: use remaining only (opening = current status, already reflects paid/received)
              // For future months: use all (opening = calculated, doesn't reflect anything yet)
              const ilMonthIncome = isCurrentMonth ? ilRemainingIncome : ilAllIncome;
              const ilMonthExpenses = isCurrentMonth ? ilRemainingExpenses : ilAllExpenses;

              const totalIncome = ilMonthIncome + (isCurrentMonth ? 0 : month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region !== 'israel').reduce((ss, i) => ss + (i.actual != null ? i.actual : (i.planned || 0)), 0), 0));
              const totalExpenses = ilMonthExpenses + (isCurrentMonth ? 0 : month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region !== 'israel').reduce((ss, i) => ss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0));
              const net = totalIncome - totalExpenses;

              // חו"ל: הכנסות מפריטים שבועיים + מקורות THB מהדשבורד (ש"ח)
              const thItemsIncome = month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'thailand').reduce((ss, i) => ss + (i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
              const thSourcesIncome = getThSources(cfSelectedMonth).reduce((s, src) => s + (src.ils || 0), 0);
              const thMonthIncome = thItemsIncome + thSourcesIncome;
              const thMonthExpenses = month.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'expense' && i.region === 'thailand').reduce((ss, i) => ss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
              // Planning vs execution gaps - separated by region
              const calcPlanGap = (region) => month.weeks.reduce((s, w) => s + w.items.filter(i => i.region === region).reduce((ss, item) => {
                const ref = item.originalPlanned != null ? item.originalPlanned : (item.planned != null ? item.planned : null);
                if (item.actual != null && ref != null && item.actual !== ref) {
                  return ss + (item.actual - ref);
                }
                return ss;
              }, 0), 0);
              const planGapIL = calcPlanGap('israel');
              const planGapTH = calcPlanGap('thailand');

              // Framework gap calculation
              const BANK_FRAMEWORK = -23500; // מסגרת בנק ישראל
              const endOfMonthILBalance = effectiveOpeningBalance + ilMonthIncome - ilMonthExpenses;
              const gapToFrameworkILS = endOfMonthILBalance - BANK_FRAMEWORK;
              const gapToFrameworkUSD = cfExchangeRates.USDILS > 0 ? gapToFrameworkILS / cfExchangeRates.USDILS : 0;
              const thMonthNet = thMonthIncome - thMonthExpenses;
              // Check if auto-calc supplement covers abroad gap
              const hasAutoCalcItem = month.weeks.some(w => w.items.some(i => i.sourceAutoCalc && i.planned > 0));
              const thGapILS = thMonthNet;
              const thGapUSD = cfExchangeRates.USDILS > 0 ? thGapILS / cfExchangeRates.USDILS : 0;

              // === NEW: Gap based on current Thailand balances vs remaining unpaid expenses ===
              const thSources = getThSources(cfSelectedMonth);
              const thBalanceILS = thSources.reduce((s, src) => {
                const cur = src.currency || 'THB';
                const rate = cur === 'SGD' ? cfExchangeRates.SGDILS : cfExchangeRates.THBILS;
                return s + (src.baht || 0) * rate;
              }, 0);
              // Remaining unpaid abroad expenses = items with region=thailand, type=expense, actual is null
              const thRemainingExp = month.weeks.reduce((s, w) => s + w.items
                .filter(i => i.type === 'expense' && i.region === 'thailand' && i.actual == null)
                .reduce((ss, i) => ss + Math.abs(i.planned || 0), 0), 0);
              // Already paid abroad expenses
              const thPaidExp = month.weeks.reduce((s, w) => s + w.items
                .filter(i => i.type === 'expense' && i.region === 'thailand' && i.actual != null)
                .reduce((ss, i) => ss + Math.abs(i.actual), 0), 0);
              // Gap to supply: positive = surplus, negative = need more money
              const thSupplyGapILS = thBalanceILS - thRemainingExp;
              const thSupplyGapUSD = cfExchangeRates.USDILS > 0 ? thSupplyGapILS / cfExchangeRates.USDILS : 0;

              const ROW_COLORS = {
                income_israel: 'rgba(20, 83, 45, 0.45)',
                income_thailand: 'rgba(5, 150, 105, 0.35)',
                expense_israel: 'rgba(127, 29, 29, 0.55)',
                expense_thailand: 'rgba(234, 88, 12, 0.35)',

              const getRowStyle = (item) => {

                      <span className="text-gray-400">THB/ILS: <b className="text-white">{cfExchangeRates.THBILS.toFixed(3)}</b></span>
                      <span className="text-gray-400">SGD/ILS: <b className="text-white">{cfExchangeRates.SGDILS.toFixed(2)}</b></span>
                    </div>
                    <button onClick={fetchExchangeRates} className="text-xs px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-gray-300">
                      {cfRatesLoaded ? 'רענן שערים' : 'טוען...'}
                    </button>
                  </div>

                  {/* Month selector */}
                  <div className="flex items-center gap-3">

                    <select value={cfSelectedMonth} onChange={e => setCfSelectedMonth(parseInt(e.target.value))}
                      className="bg-gray-700 text-white px-3 py-2 rounded border border-gray-600">
                      {cashflowData.months.map((m, i) => {
                        const isCur = i === currentMonthIdx;
                        return <option key={i} value={i} style={isCur ? {fontWeight:'bold'} : {}}>{isCur ? '● ' : ''}{m.name} 2026{isCur ? ' *' : ''}</option>;
                      })}
                    </select>
                    <button onClick={() => {
                      const rows = [['שבוע','תיאור','פירוט','קטגוריה','אזור','תקציב','בפועל','מט"ח','סכום מט"ח','תאריך','הערות']];
                      month.weeks.forEach(w => {
                        w.items.forEach(item => {
                          rows.push([
                            w.period,
                            item.description || '',
                            item.details || '',
                            item.type === 'income' ? 'הכנסה' : 'הוצאה',

                            item.foreignCurrency || '',
                            item.foreignAmount || '',
                            item.date || '',
                            item.notes || ''
                          ]);
                        });
                      });
                      rows.push([]);
                      rows.push(['סיכום', '', '', '', '', '', '', '', '', '', '']);
                      rows.push(['יתרת פתיחה', effectiveOpeningBalance]);
                      rows.push(['הכנסות ישראל', ilMonthIncome]);
                      rows.push(['הוצאות ישראל', -ilMonthExpenses]);
                      rows.push(['נטו ישראל', ilMonthIncome - ilMonthExpenses]);
                      rows.push(['מסגרת בנק', BANK_FRAMEWORK]);
                      rows.push(['פער מהמסגרת', gapToFrameworkILS]);

                          <span className="text-xs text-gray-400">מסגרת: {fmtILS(BANK_FRAMEWORK)}</span>
                        </div>
                        <div className="flex items-baseline gap-3">

                            <span className={`text-3xl font-black ${gapToFrameworkILS >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(gapToFrameworkILS)}</span>

                              {gapToFrameworkILS >= 0 ? 'מעל המסגרת' : 'מתחת למסגרת'}
                            </span>
