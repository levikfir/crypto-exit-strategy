<body>
  <div id="root"></div>
  <div id="error-display" style="display:none;position:fixed;top:0;left:0;right:0;padding:20px;background:#dc2626;color:white;font-size:14px;z-index:99999;direction:ltr;text-align:left;white-space:pre-wrap;max-height:60vh;overflow:auto;font-family:monospace;"></div>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('error-display');
      el.style.display = 'block';
      el.textContent += 'ERROR: ' + msg + '\nURL: ' + url + '\nLine: ' + line + ' Col: ' + col + '\n' + (err && err.stack ? err.stack : '') + '\n---\n';
    };
    window.addEventListener('unhandledrejection', function(e) {
      var el = document.getElementById('error-display');
      el.style.display = 'block';
      el.textContent += 'PROMISE ERROR: ' + (e.reason ? (e.reason.message || e.reason) : 'unknown') + '\n' + (e.reason && e.reason.stack ? e.reason.stack : '') + '\n---\n';
    });
  </script>

  <script>
    // Direct Babel error capture
    var origBabelTransform = null;
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        if (typeof Babel === 'undefined') {
          document.getElementById('error-display').style.display = 'block';
          document.getElementById('error-display').textContent = 'Babel failed to load from CDN. Check internet connection.';
        }
      }, 5000);
    });
  </script>
  <script type="text/babel">
    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    // === IndexedDB Storage Layer ===
    const DB_NAME = 'CryptoExitDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'keyval';

    const openDB = () => new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => req.result.createObjectStore(STORE_NAME);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });

    const idbGet = async (key) => {
      try {
        const db = await openDB();
        return new Promise((resolve) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const req = tx.objectStore(STORE_NAME).get(key);
          req.onsuccess = () => resolve(req.result !== undefined ? req.result : null);
          req.onerror = () => resolve(null);
        });
      } catch { return null; }
    };

    const idbSet = async (key, value) => {
      try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).put(value, key);
      } catch {}
    };

    // === Backup & Restore ===
    const BACKUP_KEYS = ['coinMeta', 'transactions', 'savedWallets', 'dcaState', 'cashflowData', 'cfBizAccounts', 'cfThSources', 'portfolioSnapshot', 'exitTargets', 'profitDistribution', 'sellAllocation', 'levelFilters', 'capldrIncome', 'capldrSettings', 'vaultTargets', 'preciousMetals'];
    const exportBackup = async () => {
      try {
        const backup = {};
        for (const key of BACKUP_KEYS) {
          const val = await idbGet(key);
          if (val !== null) backup[key] = val;
        }
        backup._backupDate = new Date().toISOString();
        const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'crypto-backup-' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        URL.revokeObjectURL(a.href);
      } catch (e) { alert('Backup failed: ' + e.message); }
    };
    const importBackup = async (file) => {
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data._backupDate) { alert('Invalid backup file'); return; }
        if (!confirm('Restore backup from ' + data._backupDate + '?\nThis will overwrite current data.')) return;
        for (const key of BACKUP_KEYS) {
          if (data[key] !== undefined) await idbSet(key, data[key]);
        }
        alert('Backup restored. Reloading...');
        window.location.reload();
      } catch (e) { alert('Restore failed: ' + e.message); }
    };

    // === One-time migration from localStorage to IndexedDB ===
    const LS_KEYS = ['coinMeta', 'transactions', 'savedWallets', 'dcaState', 'cashflowData', 'cfBizAccounts', 'cfThSources', 'portfolioSnapshot'];
    const migrateFromLS = async () => {
      try {
        const migrated = await idbGet('_migrated_from_ls');
        if (migrated) return;
        let found = false;
        for (const key of LS_KEYS) {
          try {
            const raw = localStorage.getItem(key);
            if (raw) {
              const existing = await idbGet(key);
              if (existing === null) {
                await idbSet(key, JSON.parse(raw));
                found = true;
              }
            }
          } catch {}
        }
        await idbSet('_migrated_from_ls', true);
        if (found) window.location.reload();
      } catch {}
    };
    migrateFromLS();

    // One-time migration: update May-December with Excel data (v4 = May updated from spreadsheet)
    const migrateExcelData = async () => {
      try {
        const migrated = await idbGet('_excel_import_v11');
        if (migrated) return;
        const existing = await idbGet('cashflowData');
        if (existing && existing.months) {
          // v9-v10: fix region only — TRAVEL SPEND & ויטנאם → israel, עוזרת & פילאטיס & סלולאר → thailand
          // v11: add missing items to May week 22-31 (ארנונה, עוזרת #4, TRAVEL SPEND #4)
          let changed = false;
          for (let i = 0; i < existing.months.length; i++) {
            const m = existing.months[i];
            if (!m || !m.weeks) continue;
            for (const w of m.weeks) {
              for (const item of w.items) {
                const d = item.description || '';
                if ((d.includes('TRAVEL SPEND') || d.includes('ויטנאם')) && item.region === 'thailand') {
                  item.region = 'israel'; changed = true;
                } else if ((d.includes('פילאטיס') || d.includes('עוזרת') || d.includes('סלולאר')) && item.region === 'israel') {
                  item.region = 'thailand'; changed = true;
                }
              }
            }
          }
          // v11: add missing items to May (month index 3) week 22-31 (index 3)
          const mayMonth = existing.months[3];
          if (mayMonth && mayMonth.weeks && mayMonth.weeks[3]) {
            const w3 = mayMonth.weeks[3];
            const descs = w3.items.map(it => it.description || '');
            const toAdd = [
              {description:"ארנונה  הוראת קבע",planned:-783,actual:null,type:"expense",region:"israel",notes:"",originalPlanned:-783},
              {description:"עוזרת #4",planned:-115,actual:null,type:"expense",region:"thailand",notes:"",originalPlanned:-115},
              {description:"#4 TRAVEL SPEND הוצאות קבועות צ'אנג מאי - כמה נשאר עד סוף החודש (שליש חודש)",planned:-2015,actual:null,type:"expense",region:"israel",notes:"",originalPlanned:-2015}
            ];
            for (const item of toAdd) {
              if (!descs.some(d => d.includes(item.description.trim().substring(0, 10)))) {
                w3.items.push(item); changed = true;
              }
            }
          }
          if (changed) await idbSet('cashflowData', existing);
        }
        await idbSet('_excel_import_v11', true);
        if (existing) window.location.reload();
      } catch {}
    };
    migrateExcelData();

    // v12: add missing transactions (USDC MEXC + 2 BTC Withdrawals) — independent migration
    const migrateTxV12 = async () => {
      try {
        const txMigrated = await idbGet('_tx_import_v14');
        if (txMigrated) return;
        let changed = false;
        let txs = await idbGet('transactions');
        if (!txs || !Array.isArray(txs)) txs = [];
        const missingTxs = [
          { coin: "USDC", type: "Deposit", wallet: "MEXC", date: "2026-04-16", amount: 9759, avgPrice: 0.999, total: 9749.241, note: "המרת BTC" },
          { coin: "BTC", type: "Withdrawal", wallet: "MEXC", date: "2026-04-16", amount: 0.13155234, avgPrice: 75164, total: 9888, note: "" },
          { coin: "BTC", type: "Withdrawal", wallet: "MEXC", date: "2025-05-15", amount: 0.1, avgPrice: 100000, total: 10000, note: "" }
        ];
        for (const mt of missingTxs) {
          const exists = txs.some(t => t.coin === mt.coin && t.type === mt.type && t.wallet === mt.wallet && t.amount === mt.amount);
          if (!exists) { txs.push({ id: Date.now() + Math.random(), ...mt }); changed = true; }
        }
        if (changed) await idbSet('transactions', txs);
        await idbSet('_tx_import_v14', true);
        if (changed) window.location.reload();
      } catch {}
    };
    migrateTxV12();

    // v13: ensure USDC exists in coinMeta in IDB
    const migrateCoinMetaV13 = async () => {
      try {
        const done = await idbGet('_coinmeta_v15');
        if (done) return;
        let meta = await idbGet('coinMeta');
        let changed = false;
        if (!meta) meta = {};
        if (!meta.USDC) {
          meta.USDC = { status: 'active', coingeckoId: 'usd-coin' };
          changed = true;
        }
        if (changed) await idbSet('coinMeta', meta);
        await idbSet('_coinmeta_v15', true);
        if (changed) window.location.reload();
      } catch {}
    };
    migrateCoinMetaV13();

    // v16: add missing weeks to June (22-30) and July (1-7, 8-14) in IDB cashflowData
    const migrateWeeksV16 = async () => {
      try {
        const done = await idbGet('_weeks_v16');
        if (done) return;
        const cf = await idbGet('cashflowData');
        if (!cf || !cf.months) { await idbSet('_weeks_v16', true); return; }
        let changed = false;
        // June (index 4): add week 22-30 if missing
        if (cf.months[4] && cf.months[4].weeks) {
          const hasW4 = cf.months[4].weeks.some(w => w.period && w.period.startsWith('22'));
          if (!hasW4) {
            cf.months[4].weeks.push({"period":"22-30","items":[
              {"description":"נטפליקס ב 9433","planned":-70,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"החזר הלוואה לאילנה","planned":-7000,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"אדם עודד 4/4","planned":-150,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"טיפול עדי ALIYA 2/2","planned":-308,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"ארנונה  הוראת קבע","planned":-783,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"עוזרת #4","planned":-115,"actual":null,"type":"expense","region":"thailand","notes":"","currency":"ILS"},
              {"description":"#4 TRAVEL SPEND הוצאות קבועות צ'אנג מאי - כמה נשאר עד סוף החודש (שליש חודש)","planned":-2015,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"אביב מורין  2/2","planned":-150,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"חוגי מוסיקה חודשיים","planned":-1080,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"}
            ]});
            changed = true;
          }
        }
        // July (index 5): add weeks 1-7 and 8-14 if missing
        if (cf.months[5] && cf.months[5].weeks) {
          const hasW1 = cf.months[5].weeks.some(w => w.period && w.period.startsWith('1-'));
          const hasW2 = cf.months[5].weeks.some(w => w.period && w.period.startsWith('8-'));
          const toInsert = [];
          if (!hasW1) {
            toInsert.push({"period":"1-7","items":[
              {"description":"שכ\"ד ישראל נכנס","planned":10500,"actual":null,"type":"income","region":"israel","notes":"","currency":"ILS"},
              {"description":"מאיר ארנונה ( פחות הסכום שהוא מקזז","planned":559,"actual":null,"type":"income","region":"israel","notes":"","currency":"ILS"},
              {"description":"כפיר דיירקט 6415","planned":-41,"actual":null,"type":"expense","region":"israel","notes":"google workspace כפיר","currency":"ILS"},
              {"description":"עוזרת #1","planned":-115,"actual":null,"type":"expense","region":"thailand","notes":"","currency":"ILS"},
              {"description":"חשבונות סלולאר","planned":-200,"actual":null,"type":"expense","region":"thailand","notes":"","currency":"ILS"},
              {"description":"#1 TRAVEL SPEND הוצאות קבועות צ'אנג מאי - כמה נשאר עד סוף החודש (רבע חודש)","planned":-2015,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"אדם עודד 4/1","planned":-150,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"חיובים קבועים בבנק","planned":-63,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"}
            ]});
          }
          if (!hasW2) {
            toInsert.push({"period":"8-14","items":[
              {"description":"הכנסה כפיר","planned":0,"actual":null,"type":"income","region":"israel","notes":"","currency":"ILS"},
              {"description":"הכנסה עדי","planned":14000,"actual":null,"type":"income","region":"israel","notes":"","currency":"ILS"},
              {"description":"עדי 2683","planned":-1199,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"חיובים קבועים בבנק","planned":-70,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"5722 אשראי הייטקזון","planned":-646,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"5722 אשראי הייטקזון","planned":-5647,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"5722 אשראי הייטקזון","planned":-4100,"actual":null,"type":"expense","region":"israel","notes":"משכנתא חיה","currency":"ILS"},
              {"description":"5722  / 0955 הייטקזון  - כפיר  (בניכוי הוצאות שוטפות ישראל)","planned":null,"actual":null,"type":"unknown","region":"israel","notes":"","currency":"ILS"},
              {"description":"2683 עדי -  (בניכוי הוצאות שוטפות ישראל)","planned":0,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"מהחשבון העסקי של עדי בגין הלוואת דיינרס שהולכת לרדת ב10 לחודש","planned":5647,"actual":null,"type":"income","region":"israel","notes":"ינואר עד נובמבר 2026","currency":"ILS"},
              {"description":"עוזרת #2","planned":-115,"actual":null,"type":"expense","region":"thailand","notes":"","currency":"ILS"},
              {"description":"#2 TRAVEL SPEND הוצאות קבועות צ'אנג מאי - כמה נשאר עד סוף החודש (רבע חודש)","planned":-2015,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"אדם עודד 4/2","planned":-150,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"אביב מורין  2/1","planned":-150,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"טיפול עדי ALIYA 1/2","planned":-308,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"},
              {"description":"קריפטו חיה","planned":17000,"actual":null,"type":"income","region":"israel","notes":"","currency":"ILS"},
              {"description":"טיסות של המשפחה לישראל על פני כל השנה","planned":0,"actual":null,"type":"expense","region":"israel","notes":"","currency":"ILS"}
            ]});
          }
          if (toInsert.length > 0) {
            cf.months[5].weeks = [...toInsert, ...cf.months[5].weeks];
            changed = true;
          }
        }
        if (changed) await idbSet('cashflowData', cf);
        await idbSet('_weeks_v16', true);
        if (changed) window.location.reload();
      } catch {}
    };
    migrateWeeksV16();

    // v17: change region to 'israel' for PREM, WISE/VOLET, שכד תאילנד, חשבונות שוטפים in months Aug-Dec (indices 6-10)
    const migrateRegionV17 = async () => {
      try {
        const done = await idbGet('_region_v17');
        if (done) return;
        const cf = await idbGet('cashflowData');
        if (!cf || !cf.months) { await idbSet('_region_v17', true); return; }
        let changed = false;
        const targetDescs = ['שכד תאילנד', 'חשבונות שוטפים תאילנד', 'תשלום חודשי לשנת לימודים', 'PREM', 'עמלת WISE', 'VOLET'];
        for (let mi = 6; mi <= 10; mi++) {
          if (!cf.months[mi]) continue;
          cf.months[mi].weeks.forEach(w => {
            w.items.forEach(item => {
              if (item.type === 'expense' && item.region === 'thailand') {
                const d = item.description;
                if (targetDescs.some(t => d.includes(t))) {
                  item.region = 'israel';
                  changed = true;
                }
              }
            });
          });
        }
        if (changed) await idbSet('cashflowData', cf);
        await idbSet('_region_v17', true);
        if (changed) window.location.reload();
      } catch {}
    };
    migrateRegionV17();

    // v18: split "חשבונות שוטפים תאילנד" into separate electricity + water in Aug-Dec
    const migrateSplitUtilV18 = async () => {
      try {
        const done = await idbGet('_splitutil_v18');
        if (done) return;
        const cf = await idbGet('cashflowData');
        if (!cf || !cf.months) { await idbSet('_splitutil_v18', true); return; }
        let changed = false;
        for (let mi = 6; mi <= 10; mi++) {
          if (!cf.months[mi]) continue;
          cf.months[mi].weeks.forEach(w => {
            const newItems = [];
            w.items.forEach(item => {
              if (item.description && item.description.includes('חשבונות שוטפים תאילנד')) {
                newItems.push({ description: 'חשמן חשמל תאילנד', planned: -700, actual: null, type: 'expense', region: 'israel', notes: '', date: '15 לחודש - 21 לחודש' });
                newItems.push({ description: 'חשמן סוס תאילנד', planned: -100, actual: null, type: 'expense', region: 'israel', notes: '', date: '15 לחודש - 21 לחודש' });
                changed = true;
              } else {
                newItems.push(item);
              }
            });
            w.items = newItems;
          });
        }
        if (changed) await idbSet('cashflowData', cf);
        await idbSet('_splitutil_v18', true);
        if (changed) window.location.reload();
      } catch {}
    };
    migrateSplitUtilV18();

    // Sync hook: load from IDB on mount, save on change
    // mergeFn(idbValue, initialValue) → merged value (optional, for merging defaults into IDB data)
    const useIDBState = (key, initialValue, mergeFn) => {
      const [state, setState] = useState(initialValue);
      const loaded = useRef(false);
      const skipNextSave = useRef(true);

      useEffect(() => {
        idbGet(key).then(val => {
          if (val !== null) {
            const final = mergeFn ? mergeFn(val, initialValue) : val;
            setState(final);
            // If merge changed something, persist it
            if (mergeFn && final !== val) idbSet(key, final);
          }
          loaded.current = true;
          // allow saves after a tick
          setTimeout(() => { skipNextSave.current = false; }, 100);
        });
      }, []);

      useEffect(() => {
        if (skipNextSave.current) return;
        idbSet(key, state);
      }, [state]);

      return [state, setState];
    };

    const INITIAL_TXS = [
        { id: 1, coin: "XRP", type: "Buy", wallet: "MEXC", date: "2025-10-13", amount: 1963.22, avgPrice: 0.5, total: 981.61 },
        { id: 2, coin: "XRP", type: "Buy", wallet: "MEXC", date: "2025-10-13", amount: 3772.0, avgPrice: 0.65, total: 2451.8 },

        { key: 'MA50_to_MA100',  label: 'MA50 → MA100',        mult: 1.00, color: '#ef4444' },
        { key: 'MA100_to_MA200', label: 'MA100 → MA200',       mult: 1.00, color: '#22c55e' },
        { key: 'AT_MA200',       label: 'נגיעה ב-MA200',       mult: 1.00, color: '#facc15', deployReserve: true },
        { key: 'SKIP',           label: 'דילוג',               mult: 0.00, color: '#6b7280' },
      ];

      const dcaDefault = {
        totalBudget: 5000,
        weeks: 50,
        coins: [
          { symbol: 'XRP',  name: 'Ripple',      coingeckoId: 'ripple',          rows: [] },
          { symbol: 'HBAR', name: 'Hedera',      coingeckoId: 'hedera-hashgraph', rows: [] },
          { symbol: 'CC',   name: 'Canton',      coingeckoId: 'canton-network',   rows: [] },
          { symbol: 'XDC',  name: 'XDC Network', coingeckoId: 'xdce-crowd-sale',  rows: [] },
          { symbol: 'ALGO', name: 'Algorand',    coingeckoId: 'algorand',         rows: [] },
        ],
      };

      const [dcaState, setDcaState] = useIDBState('dcaState', dcaDefault);
      const [showAddDcaCoin, setShowAddDcaCoin] = useState(false);
      const [newDcaCoin, setNewDcaCoin] = useState({ symbol: '', name: '', coingeckoId: '' });

      // helpers - budget per coin (custom or equal split)
      const dcaNumCoins = dcaState.coins.length || 1;
      const dcaBudgetPerCoin = (symbol) => {
        if (symbol) {
          const coin = dcaState.coins.find(c => c.symbol === symbol);
          if (coin && coin.customBudget > 0) return coin.customBudget;
        }
        // Equal split among coins without custom budget
        const customCoins = dcaState.coins.filter(c => c.customBudget > 0);
        const customTotal = customCoins.reduce((s, c) => s + c.customBudget, 0);
        const autoCoins = dcaState.coins.filter(c => !c.customBudget || c.customBudget <= 0);
        const remaining = dcaState.totalBudget - customTotal;
        return autoCoins.length > 0 ? remaining / autoCoins.length : 0;
      };
      const dcaWeeklyBase = (symbol) => dcaBudgetPerCoin(symbol) / dcaState.weeks;

      // Compute per-coin summary (invested, reserve, coins, currentValue)
      const dcaCoinSummary = (coin) => {
        const weekly = dcaWeeklyBase(coin.symbol);
        let reserve = 0;
        let invested = 0;
        let coinsBought = 0;
        const rows = coin.rows.map((row) => {
          const zoneDef = DCA_ZONES.find(z => z.key === row.zone);
          let toInvest = 0;
          let toReserve = 0;
          if (!row.zone) {
            toInvest = 0; toReserve = 0;
          } else if (row.zone === 'SKIP') {
            toInvest = 0; toReserve = weekly;
          } else if (zoneDef?.deployReserve) {
            toInvest = weekly + reserve;
            toReserve = 0;
          } else {
            toInvest = weekly * (zoneDef?.mult || 0);
            toReserve = weekly - toInvest;
          }
          // Use customInvest if manually overridden
          if (row.customInvest != null) {
            toInvest = parseFloat(row.customInvest) || 0;
            toReserve = weekly - toInvest;
            if (toReserve < 0) toReserve = 0;
          }
          if (zoneDef?.deployReserve && row.customInvest == null) reserve = 0;
          else reserve = reserve + toReserve;
          invested += toInvest;
          coinsBought += (parseFloat(row.coinsPurchased) || 0);
          return {
            ...row,
            toInvest,
            toReserve,
            reserve,
            coinsCumulative: coinsBought,
            valueNow: coinsBought * (currentPrices[coin.symbol] || 0),
          };
        });
        const currentPrice = currentPrices[coin.symbol] || 0;
        const currentValue = coinsBought * currentPrice;
        return { rows, invested, reserve, coinsBought, currentValue, weekly };
      };

      const dcaUpdateCoin = (symbol, updates) => {
        setDcaState(s => ({
          ...s,
          coins: s.coins.map(c => c.symbol === symbol ? { ...c, ...updates } : c)
        }));
      };

      // Wallet mapping for DCA coins
      const DCA_WALLET_MAP = { HBAR: 'Binance', XRP: 'Binance', ALGO: 'Binance', CC: 'MEXC', XDC: 'MEXC' };
      const getDcaWallet = (symbol) => DCA_WALLET_MAP[symbol] || 'MEXC';

      // Ref to pass pending transaction operations from inside setDcaState updater to outside
      const pendingDcaTxOps = useRef([]);

      const dcaUpdateRow = (symbol, rowIdx, updates) => {
        pendingDcaTxOps.current = [];
        setDcaState(s => {
          const coinData = s.coins.find(c => c.symbol === symbol);
          const oldRow = coinData?.rows[rowIdx];

          // When zone changes, clear customInvest so zone logic takes over
          if (updates.zone !== undefined && updates.customInvest === undefined) {
            updates.customInvest = null;
          }
          // Auto-calculate coinsPurchased when zone or price changes (and no manual customInvest)
          const mergedForCheck = { ...oldRow, ...updates };
          const shouldAutoCalc = (updates.zone !== undefined || updates.price !== undefined) && updates.coinsPurchased === undefined && mergedForCheck.customInvest == null;
          if (shouldAutoCalc) {
            const mergedRow = mergedForCheck;
            const price = parseFloat(mergedRow.price) || 0;
            if (price > 0 && mergedRow.zone && mergedRow.zone !== 'SKIP') {
              // Use s (latest state) for budget calculations, not stale dcaState
              const thisCoin = s.coins.find(c => c.symbol === symbol);
              const hasCustom = thisCoin && thisCoin.customBudget > 0;
              let coinBudget;
              if (hasCustom) {
                coinBudget = thisCoin.customBudget;
              } else {
                const customTotal = s.coins.filter(c => c.customBudget > 0).reduce((sum, c) => sum + c.customBudget, 0);
                const autoCount = s.coins.filter(c => !c.customBudget || c.customBudget <= 0).length || 1;
                coinBudget = (s.totalBudget - customTotal) / autoCount;
              }
              const weekly = coinBudget / s.weeks;
              // Calculate reserve up to this row
              let reserve = 0;
              for (let i = 0; i < rowIdx; i++) {
                const r = coinData.rows[i];
                const zd = DCA_ZONES.find(z => z.key === r.zone);
                if (r.customInvest != null) {
                  const ci = parseFloat(r.customInvest) || 0;
                  const tr = weekly - ci;
                  reserve += tr > 0 ? tr : 0;
                } else if (!r.zone) { /* nothing */ }
                else if (r.zone === 'SKIP') { reserve += weekly; }
                else if (zd?.deployReserve) { reserve = 0; }
                else { reserve += weekly - weekly * (zd?.mult || 0); }
              }
              const zoneDef = DCA_ZONES.find(z => z.key === mergedRow.zone);
              let toInvest = 0;
              if (zoneDef?.deployReserve) { toInvest = weekly + reserve; }
              else { toInvest = weekly * (zoneDef?.mult || 0); }
              const autoCoins = toInvest / price;
              if (autoCoins > 0) updates.coinsPurchased = autoCoins.toFixed(1);
            }
          }

          const newState = {
            ...s,
            coins: s.coins.map(c => c.symbol !== symbol ? c : ({
              ...c,
              rows: c.rows.map((r, i) => i === rowIdx ? { ...r, ...updates } : r)
            }))
          };

          // Queue transaction operations (will be executed OUTSIDE the setDcaState updater)
          if (updates.coinsPurchased !== undefined && oldRow) {
            const newAmount = parseFloat(updates.coinsPurchased) || 0;
            const oldAmount = parseFloat(oldRow.coinsPurchased) || 0;
            const wallet = getDcaWallet(symbol);
            const txId = `dca_${symbol}_${rowIdx}_${oldRow.date}`;
            const txIdW = `dca_w_${symbol}_${rowIdx}_${oldRow.date}`;
            if (newAmount > 0 && newAmount !== oldAmount) {
              const price = parseFloat(oldRow.price || updates.price) || 0;
              const total = newAmount * price;
              // Use dcaId-based unique IDs to prevent duplicate React keys when multiple coins are processed simultaneously
              const uniqueIdBase = Math.abs(txId.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, 0)) || Date.now();
              pendingDcaTxOps.current.push({
                action: 'upsert',
                removeIds: [txId, txIdW],
                add: [{
                  id: uniqueIdBase,
                  dcaId: txId,
                  coin: symbol,
                  type: 'Deposit',
                  wallet: wallet,
                  date: oldRow.date,
                  amount: newAmount,
                  avgPrice: price,
                  total: total,
                  note: `DCA ${oldRow.zone || 'manual'} - ${wallet}`
                }, {
                  id: uniqueIdBase + 1,
                  dcaId: txIdW,
                  coin: 'USDC',
                  type: 'Withdrawal',
                  wallet: wallet,
                  date: oldRow.date,
                  amount: total,
                  avgPrice: 1,
                  total: total,
                  note: `DCA המרה ל-${symbol}`
                }]
              });
            } else if (newAmount === 0 || updates.coinsPurchased === '') {
              pendingDcaTxOps.current.push({
                action: 'remove',
                removeIds: [txId, txIdW]
              });
            }
          }

          return newState;
        });

        // Process pending transaction operations OUTSIDE setDcaState updater
        pendingDcaTxOps.current.forEach(op => {
          if (op.action === 'upsert') {
            setTransactions(prev => {
              const filtered = prev.filter(t => !op.removeIds.includes(t.dcaId));
              return [...filtered, ...op.add];
            });
          } else if (op.action === 'remove') {
            setTransactions(prev => prev.filter(t => !op.removeIds.includes(t.dcaId)));
          }
        });
        pendingDcaTxOps.current = [];
      };

      const dcaAddWeekRow = (symbol) => {
        setDcaState(s => ({
          ...s,
          coins: s.coins.map(c => {
            if (c.symbol !== symbol) return c;
            const nextDate = c.rows.length > 0
              ? new Date(new Date(c.rows[c.rows.length - 1].date).getTime() + 7 * 86400000)
              : new Date();
            const livePrice = currentPrices[c.symbol] || 0;
            return { ...c, rows: [...c.rows, {
              date: nextDate.toISOString().slice(0,10),
              price: livePrice > 0 ? livePrice.toString() : '',
              zone: '',
              coinsPurchased: '',
            }] };
          })
        }));
      };

      const dcaRefreshRowPrice = (symbol, rowIdx) => {
        const price = currentPrices[symbol] || 0;
        if (price > 0) {
          dcaUpdateRow(symbol, rowIdx, { price: price.toString() });
        }
      };

      // Auto-fill today's DCA rows with live prices
      useEffect(() => {
        const today = new Date().toISOString().slice(0,10);
        let needsUpdate = false;
        const updated = {
          ...dcaState,
          coins: dcaState.coins.map(c => {
            const livePrice = currentPrices[c.symbol];
            if (!livePrice || livePrice <= 0) return c;
            const newRows = c.rows.map(row => {
              if (row.date === today && (!row.price || parseFloat(row.price) === 0)) {
                needsUpdate = true;
                return { ...row, price: livePrice.toString() };
              }
              return row;
            });
            return { ...c, rows: newRows };
          })
        };
        if (needsUpdate) setDcaState(updated);
      }, [currentPrices]);

      // Auto-calc coinsPurchased for existing rows that have price+zone but no coins
      const dcaAutoCalcRunning = useRef(false);
      useEffect(() => {
        // Prevent re-entry: dcaUpdateRow triggers setDcaState which re-triggers this effect
        if (dcaAutoCalcRunning.current) return;
        // Check if any rows need auto-calc
        const rowsToCalc = [];
        dcaState.coins.forEach((c, ci) => c.rows.forEach((r, ri) => {
          const price = parseFloat(r.price) || 0;
          const hasCoins = r.coinsPurchased && parseFloat(r.coinsPurchased) > 0;
          if (price > 0 && r.zone && r.zone !== 'SKIP' && !hasCoins) {
            rowsToCalc.push({ symbol: c.symbol, rowIdx: ri });
          }
        }));
        if (rowsToCalc.length === 0) return;

        // Use dcaUpdateRow so transactions are created automatically
        dcaAutoCalcRunning.current = true;
        rowsToCalc.forEach(({ symbol, rowIdx }) => {
          const coinData = dcaState.coins.find(c => c.symbol === symbol);
          const row = coinData?.rows[rowIdx];
          if (!row) return;
          // Trigger auto-calc by "updating" the zone (dcaUpdateRow auto-calcs coinsPurchased)
          dcaUpdateRow(symbol, rowIdx, { zone: row.zone });
        });
        // Reset after a tick to allow future legitimate auto-calcs
        setTimeout(() => { dcaAutoCalcRunning.current = false; }, 200);
      }, [dcaState]);

      // ═══════════════════════════════════════════════════════════════
      // DCA → Transactions sync: ensure every DCA row with purchases has a matching transaction
      // ═══════════════════════════════════════════════════════════════
      const dcaSyncRan = useRef(false);
      useEffect(() => {
        if (dcaSyncRan.current) return;
        if (!dcaState?.coins?.length || !transactions) return;
        // Don't run until real data is loaded from IDB (default has empty rows)
        const hasRealData = dcaState.coins.some(c => c.rows.length > 0);
        if (!hasRealData) return;
        dcaSyncRan.current = true;

        const existingDcaIds = new Set(transactions.filter(t => t.dcaId).map(t => t.dcaId));
        const toAdd = [];
        const validDcaIds = new Set();

        dcaState.coins.forEach(coin => {
          coin.rows.forEach((row, rowIdx) => {
            const amount = parseFloat(row.coinsPurchased) || 0;
            if (amount <= 0) return;
            const price = parseFloat(row.price) || 0;
            const total = amount * price;
            const txId = `dca_${coin.symbol}_${rowIdx}_${row.date}`;
            const txIdW = `dca_w_${coin.symbol}_${rowIdx}_${row.date}`;
            validDcaIds.add(txId);
            validDcaIds.add(txIdW);

            // Check if deposit transaction exists
            if (!existingDcaIds.has(txId)) {
              const wallet = getDcaWallet(coin.symbol);
              const uniqueId = Math.abs(txId.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, 0)) || Date.now();
              toAdd.push({
                id: uniqueId,
                dcaId: txId,
                coin: coin.symbol,
                type: 'Deposit',
                wallet: wallet,
                date: row.date,
                amount: amount,
                avgPrice: price,
                total: total,
                note: `DCA ${row.zone || 'manual'} - ${wallet} (sync)`
              });
            }
            // Check if USDC withdrawal transaction exists
            if (!existingDcaIds.has(txIdW)) {
              const wallet = getDcaWallet(coin.symbol);
              const uniqueId = Math.abs(txIdW.split('').reduce((h, c) => (h * 31 + c.charCodeAt(0)) | 0, 0)) || Date.now();
              toAdd.push({
                id: uniqueId + 1,
                dcaId: txIdW,
                coin: 'USDC',
                type: 'Withdrawal',
                wallet: wallet,
                date: row.date,
                amount: total,
                avgPrice: 1,
                total: total,
                note: `DCA המרה ל-${coin.symbol} (sync)`
              });
            }
          });
        });

        // Remove orphan DCA transactions (dcaId exists but no matching DCA row)
        const orphanIds = transactions
          .filter(t => t.dcaId && (t.dcaId.startsWith('dca_') || t.dcaId.startsWith('dca_w_')) && !validDcaIds.has(t.dcaId))
          .map(t => t.dcaId);

        if (toAdd.length > 0 || orphanIds.length > 0) {
          console.log(`[DCA Sync] Adding ${toAdd.length} missing transactions, removing ${orphanIds.length} orphans`);
          setTransactions(prev => {
            let updated = orphanIds.length > 0 ? prev.filter(t => !orphanIds.includes(t.dcaId)) : [...prev];
            return [...updated, ...toAdd];
          });
        }
      }, [dcaState, transactions]);

      const dcaDeleteRow = (symbol, rowIdx) => {
        // Remove corresponding transactions
        const coinData = dcaState.coins.find(c => c.symbol === symbol);
        if (coinData && coinData.rows[rowIdx]) {
          const row = coinData.rows[rowIdx];
          const txId = `dca_${symbol}_${rowIdx}_${row.date}`;
          const txIdW = `dca_w_${symbol}_${rowIdx}_${row.date}`;
          setTransactions(prev => prev.filter(t => t.dcaId !== txId && t.dcaId !== txIdW));
        }
        setDcaState(s => ({
          ...s,
          coins: s.coins.map(c => c.symbol !== symbol ? c : ({
            ...c,
            rows: c.rows.filter((_, i) => i !== rowIdx)
          }))
        }));
      };

      const dcaRemoveCoin = (symbol) => {
        if (!confirm(`להסיר את ${symbol} מ-DCA?`)) return;
        // Remove all DCA transactions for this coin
        setTransactions(prev => prev.filter(t => !t.dcaId || !t.dcaId.startsWith(`dca_${symbol}_`) && !t.dcaId.startsWith(`dca_w_${symbol}_`)));
        setDcaState(s => ({ ...s, coins: s.coins.filter(c => c.symbol !== symbol) }));
      };

      const dcaAddCoin = () => {
        const sym = (newDcaCoin.symbol || '').toUpperCase().trim();
        if (!sym) return;
        if (dcaState.coins.some(c => c.symbol === sym)) { alert('המטבע כבר קיים ברשימת DCA'); return; }
        const cgId = (newDcaCoin.coingeckoId || coinGeckoIds[sym] || '').trim();
        setDcaState(s => ({ ...s, coins: [...s.coins, {
          symbol: sym,
          name: newDcaCoin.name || sym,
          coingeckoId: cgId,
          rows: [],
        }] }));
        setNewDcaCoin({ symbol: '', name: '', coingeckoId: '' });
        setShowAddDcaCoin(false);
      };

      // DCA Growth Chart component
      const DcaGrowthChart = ({ weekData }) => {
        const canvasRef = useRef(null);
        const chartRef = useRef(null);

        useEffect(() => {
          if (!canvasRef.current || !weekData || weekData.length === 0) return;
          if (typeof Chart === 'undefined') return;

          if (chartRef.current) {
            chartRef.current.destroy();
          }

          const ctx = canvasRef.current.getContext('2d');
          chartRef.current = new Chart(ctx, {
            type: 'line',
            data: {
              labels: weekData.map(d => `שבוע ${d.week}`),
              datasets: [
                {
                  label: 'מושקע מצטבר',
                  data: weekData.map(d => d.invested),
                  borderColor: '#3b82f6',
                  backgroundColor: 'rgba(59, 130, 246, 0.1)',
                  fill: true,
                  tension: 0.3,
                  pointRadius: 2,
                  borderWidth: 2,
                },
                {
                  label: 'קופה (Reserve)',
                  data: weekData.map(d => d.reserve),
                  borderColor: '#eab308',
                  backgroundColor: 'rgba(234, 179, 8, 0.1)',
                  fill: true,
                  tension: 0.3,
                  pointRadius: 2,
                  borderWidth: 2,
                },
                {
                  label: 'שווי תיק נוכחי',
                  data: weekData.map(d => d.value),
                  borderColor: '#06b6d4',
                  backgroundColor: 'rgba(6, 182, 212, 0.1)',
                  fill: true,
                  tension: 0.3,
                  pointRadius: 2,
                  borderWidth: 2,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  labels: { color: '#d1d5db', font: { size: 12 } },
                  rtl: true,
                },
                tooltip: {
                  rtl: true,
                  callbacks: {
                    label: function(ctx) {
                      return `${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                    }
                  }
                }
              },
              scales: {
                x: {
                  ticks: { color: '#9ca3af', maxRotation: 45, autoSkip: true, maxTicksLimit: 15 },
                  grid: { color: 'rgba(75, 85, 99, 0.3)' },
                },
                y: {
                  ticks: {
                    color: '#9ca3af',
                    callback: function(val) { return '$' + val.toLocaleString(); }
                  },
                  grid: { color: 'rgba(75, 85, 99, 0.3)' },
                },
              },
            },
          });

          return () => {
            if (chartRef.current) {
              chartRef.current.destroy();
              chartRef.current = null;
            }
          };
        }, [weekData]);

        if (!weekData || weekData.length === 0) {
          return React.createElement('div', { className: 'bg-gray-800 rounded-lg p-4 border border-gray-700 text-center text-gray-500 text-sm' },
            'הוסף שורות DCA כדי לראות את גרף הצמיחה'
          );
        }

        return React.createElement('div', { className: 'bg-gray-800 rounded-lg p-4 border border-gray-700' },
          React.createElement('div', { className: 'text-sm font-semibold mb-3 text-cyan-400' }, 'גרף צמיחה (Growth Chart)'),
          React.createElement('div', { style: { height: '320px', position: 'relative' } },
            React.createElement('canvas', { ref: canvasRef })
          )
        );
      };

      const INITIAL_EXIT_TARGETS = {
        XRP: [
          { level: 'LOW', targetPrice: 2.20, percentToSell: 15, fib: 0 },
          { level: 'LOW', targetPrice: 2.75, percentToSell: 15, fib: 2.618 },
          { level: 'MID', targetPrice: 3.00, percentToSell: 15, fib: 3.618 },
          { level: 'HIGH', targetPrice: 3.20, percentToSell: 15, fib: 4.236 },
          { level: 'HIGH', targetPrice: 3.80, percentToSell: 15, fib: 5.500 },
        ],
        XLM: [
          { level: 'LOW', targetPrice: 1.30, percentToSell: 10, fib: 2.618 },
          { level: 'LOW', targetPrice: 1.90, percentToSell: 10, fib: 3.618 },
          { level: 'MID', targetPrice: 2.40, percentToSell: 27.5, fib: 4.236 },
          { level: 'MID', targetPrice: 4.00, percentToSell: 27.5, fib: 5.500 },

        XDC: [

          { level: 'MID', targetPrice: 1.00, percentToSell: 27.5, fib: 4.236 },
          { level: 'HIGH', targetPrice: 1.25, percentToSell: 12.5, fib: 5.500 },
          { level: 'HIGH', targetPrice: 2.00, percentToSell: 12.5, fib: 6.500 },
        ],
        ALGO: [
          { level: 'LOW', targetPrice: 2.00, percentToSell: 10, fib: 1.618 },
          { level: 'LOW', targetPrice: 3.50, percentToSell: 10, fib: 2.618 },
          { level: 'MID', targetPrice: 4.50, percentToSell: 12.5, fib: 3.618 },

      const fetchExchangeRates = useCallback(async () => {
        try {
          const res = await fetch('https://api.exchangerate-api.com/v4/latest/ILS');
          const data = await res.json();
          if (data && data.rates) {
            setCfExchangeRates({
              USDILS: 1 / (data.rates.USD || 0.274),
              THBILS: 1 / (data.rates.THB || 9.52),
              SGDILS: 1 / (data.rates.SGD || 0.365),
            });
            setCfRatesLoaded(true);

        } catch (e) { console.log('Exchange rate fetch failed', e); }
      }, []);

      useEffect(() => { fetchExchangeRates(); }, []);

      const cfUpdateActual = (monthIdx, weekIdx, itemIdx, value) => {
        const raw = String(value).replace(/[^0-9.\-]/g, '');
        let num = (raw === '' || raw === '-') ? null : parseFloat(raw);
        setCashflowData(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const item = next.months[monthIdx].weeks[weekIdx].items[itemIdx];
          if (num !== null && !isNaN(num)) {
            if (item.type === 'income' && num < 0) num = Math.abs(num);
            if (item.type === 'expense' && num > 0) num = -num;
          }
          item.actual = isNaN(num) ? null : num;
          return next;
        });
      };

      const cfAddItem = (monthIdx, weekIdx, item) => {
        setCashflowData(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const safeItem = { ...item };
          // Enforce sign: expense = negative, income = positive
          if (safeItem.planned != null && !isNaN(safeItem.planned)) {
            if (safeItem.type === 'income' && safeItem.planned < 0) safeItem.planned = Math.abs(safeItem.planned);
            if (safeItem.type === 'expense' && safeItem.planned > 0) safeItem.planned = -safeItem.planned;
          }
          if (safeItem.actual != null && !isNaN(safeItem.actual)) {
            if (safeItem.type === 'income' && safeItem.actual < 0) safeItem.actual = Math.abs(safeItem.actual);
            if (safeItem.type === 'expense' && safeItem.actual > 0) safeItem.actual = -safeItem.actual;
          }
          // Mark items added during or after the month as "added during month"
          // so they don't count in "תכנון מקורי" (original plan)
          const currentRealMonth = new Date().getMonth(); // 0=Jan
          const currentMonthIdx = currentRealMonth - 1; // cashflow: 0=Feb
          if (monthIdx <= currentMonthIdx) {
            safeItem.addedDuringMonth = true;
          }
          next.months[monthIdx].weeks[weekIdx].items.push(safeItem);
          return next;
        });
      };

      const cfUpdateItem = (monthIdx, weekIdx, itemIdx, updates) => {
        setCashflowData(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          const item = next.months[monthIdx].weeks[weekIdx].items[itemIdx];
          Object.assign(item, updates);
          // Enforce sign after update
          const t = item.type;
          if (item.planned != null && !isNaN(item.planned)) {
            if (t === 'income' && item.planned < 0) item.planned = Math.abs(item.planned);
            if (t === 'expense' && item.planned > 0) item.planned = -item.planned;
          }
          if (item.actual != null && !isNaN(item.actual)) {

          }
          return next;
        });

            next.months[monthIdx].weeks[weekIdx].items.splice(itemIdx, 1);
          }
          return next;
        });
        return true;
      };

              tierPct: tier.pct,
              tierLabel: tier.label,
              tierColor: tier.color,
              direction: price >= target.targetPrice ? 'reached' : 'approaching',
              timestamp: Date.now(),
              seen: false
            });
          }
        });
        if (newAlerts.length > 0) {
          setAlertHistory(prev => [...newAlerts, ...prev].slice(0, 50));
          // Show browser notification
          if (notifPermission === 'granted') {
            newAlerts.forEach(alert => {
              const typeLabel = alert.type === 'vault' ? 'VAULT' : 'EXIT';
              const priceStr = alert.currentPrice < 1 ? '$' + alert.currentPrice.toFixed(6) : '$' + alert.currentPrice.toLocaleString('en-US', { maximumFractionDigits: 2 });
              const targetStr = alert.targetPrice < 1 ? '$' + alert.targetPrice.toFixed(6) : '$' + alert.targetPrice.toLocaleString('en-US', { maximumFractionDigits: 2 });
              const urgencyIcon = { green: '\u{1F7E2}', yellow: '\u{1F7E1}', orange: '\u{1F7E0}', red: '\u{1F534}' }[alert.tierColor] || '';
              new Notification(`${urgencyIcon} ${alert.symbol} ${alert.tierLabel} - ${typeLabel} (${alert.level})`, {
                body: `${priceStr} / target: ${targetStr} (${alert.proximity}%)`,
                icon: 'pwa-icon-192.png',
                tag: `crypto-${alert.symbol}-${alert.type}-${alert.level}-${alert.tierPct}`,
                renotify: true
              });
            });
          }
        }
      }, [currentPrices, alertsEnabled]);

      const requestNotifPermission = async () => {
        if (typeof Notification === 'undefined') return;
        const perm = await Notification.requestPermission();
        setNotifPermission(perm);
        if (perm === 'granted') setAlertsEnabled(true);
      };

      const installPwa = async () => {
        if (!pwaInstallPrompt) return;
        pwaInstallPrompt.prompt();
        const result = await pwaInstallPrompt.userChoice;
        if (result.outcome === 'accepted') setPwaInstallPrompt(null);
      };

      const unseenAlertCount = alertHistory.filter(a => !a.seen).length;
      const markAlertsSeen = () => setAlertHistory(prev => prev.map(a => ({ ...a, seen: true })));
      // ============ END PWA & ALERTS ============

      const initializeEmptyTargets = useCallback((symbol) => {
        if (!exitTargets[symbol]) {
          setExitTargets(prev => ({ ...prev, [symbol]: [] }));
        }
        setSelectedCoin(symbol);
      }, [exitTargets]);

      // Portfolio calculations
      const portfolioSummary = useMemo(() => {
        return coins.map(coin => {
          const ath = athPrices[coin.symbol] || 0;
          const current = currentPrices[coin.symbol] || 0;
          const currentValue = coin.coins * current;
          const athVsCurrent = ath > 0 ? ((current - ath) / ath) * 100 : 0;
          const buyVsCurrent = coin.avgBuy > 0 && current > 0 ? ((current - coin.avgBuy) / coin.avgBuy) * 100 : 0;
          return { ...coin, ath, current, currentValue, athVsCurrent, buyVsCurrent, totalInvestment: coin.coins * coin.avgBuy };
        });
      }, [coins, athPrices, currentPrices]);

      const totalPortfolioValue = useMemo(() => portfolioSummary.reduce((sum, c) => sum + c.currentValue, 0), [portfolioSummary]);
      const totalInvestment = useMemo(() => portfolioSummary.reduce((sum, c) => sum + c.totalInvestment, 0), [portfolioSummary]);
      const totalPnL = totalPortfolioValue - totalInvestment;
      const totalPnLPercent = totalInvestment > 0 ? (totalPnL / totalInvestment) * 100 : 0;

      // Full profitability summary
      const totalBuys = useMemo(() => transactions.filter(t => t.type === 'Buy').reduce((s, t) => s + t.total, 0), [transactions]);
      const totalSells = useMemo(() => transactions.filter(t => t.type === 'Sell').reduce((s, t) => s + t.total, 0), [transactions]);
      const totalDeposits = useMemo(() => transactions.filter(t => t.type === 'Deposit').reduce((s, t) => s + t.total, 0), [transactions]);
      const totalWithdrawals = useMemo(() => transactions.filter(t => t.type === 'Withdrawal').reduce((s, t) => s + t.total, 0), [transactions]);
      const overallProfit = (totalSells + totalPortfolioValue) - totalBuys;
      const overallProfitPct = totalBuys > 0 ? (overallProfit / totalBuys) * 100 : 0;

      // Feature 1: Wallet summary
      const walletSummary = useMemo(() => {
        const wallets = {};
        transactions.forEach(tx => {
          if (!wallets[tx.wallet]) wallets[tx.wallet] = { coins: {}, totalInvested: 0, lastActivity: null };
          const w = wallets[tx.wallet];
          if (!w.coins[tx.coin]) w.coins[tx.coin] = 0;
          const delta = tx.type === 'Sell' || tx.type === 'Withdrawal' ? -tx.amount : tx.amount;
          w.coins[tx.coin] += delta;
          if (tx.type === 'Buy') w.totalInvested += tx.total;
          else if (tx.type === 'Sell') w.totalInvested -= tx.total;
          w.lastActivity = !w.lastActivity || tx.date > w.lastActivity ? tx.date : w.lastActivity;
        });
        return Object.entries(wallets).map(([wallet, data]) => {
          let currentValue = 0, uniqueCoins = 0;
          Object.entries(data.coins).forEach(([coin, amt]) => {
            if (amt > 0) {
              currentValue += amt * (currentPrices[coin] || 0);
              uniqueCoins++;
            }
          });
          return {
            wallet, coins: data.coins, currentValue, totalInvested: data.totalInvested,
            pnl: currentValue - data.totalInvested, pnlPct: data.totalInvested > 0 ? ((currentValue - data.totalInvested) / data.totalInvested) * 100 : 0,
            lastActivity: data.lastActivity, uniqueCoins
          };
        }).sort((a, b) => b.currentValue - a.currentValue);
      }, [transactions, currentPrices]);

      // Exit strategy calculations (uses sellAllocation to determine tradeable coins)
      const exitCalculations = useMemo(() => {
        if (!selectedCoin || !exitTargets[selectedCoin]) return [];
        const coin = portfolioSummary.find(c => c.symbol === selectedCoin);
        if (!coin) return [];
        const alloc = (sellAllocation[selectedCoin] || 65) / 100;
        const tradeableCoins = coin.coins * alloc;
        let cumulativePercentSold = 0;
        return exitTargets[selectedCoin].map((target) => {
          const coinsToSell = tradeableCoins * (target.percentToSell / 100);
          const salesValue = coinsToSell * target.targetPrice;
          const gainFromAth = coin.ath > 0 ? ((target.targetPrice / coin.ath) - 1) * 100 : 0;
          const gainFromCurrent = coin.current > 0 ? ((target.targetPrice / coin.current) - 1) * 100 : 0;
          const gainFromBuy = coin.avgBuy > 0 ? ((target.targetPrice / coin.avgBuy) - 1) * 100 : 0;
          cumulativePercentSold += target.percentToSell;
          return { ...target, coinsToSell, salesValue, gainFromAth, gainFromCurrent, gainFromBuy, bagsLeft: Math.max(0, 100 - cumulativePercentSold) };
        });
      }, [selectedCoin, exitTargets, portfolioSummary, sellAllocation]);

      // Vault calculations per coin
      const vaultCalculations = useMemo(() => {
        if (!selectedVaultCoin) return [];
        const coin = portfolioSummary.find(c => c.symbol === selectedVaultCoin);
        if (!coin) return [];
        const targets = vaultTargets[selectedVaultCoin] || [];
        const coinVaultPercent = getVaultPercent(selectedVaultCoin);
        // All rows use their own percentOfPortfolio (editable)
        return targets.map((target) => {
          const vaultPct = target.percentOfPortfolio || 0; // stored as % of vault
          const pctOfVault = vaultPct; // stored value IS the vault %
          // pct = absolute % of portfolio, converted from vault-relative
          const pct = vaultPct * coinVaultPercent / 100;
          const vaultCoins = coin.coins * (pct / 100);
          const coinsToSell = vaultCoins;
          const salesValue = coinsToSell * target.targetPrice;
          const gainFromAth = coin.ath > 0 ? ((target.targetPrice / coin.ath) - 1) * 100 : 0;
          const gainFromCurrent = coin.current > 0 ? ((target.targetPrice / coin.current) - 1) * 100 : 0;
          const gainFromBuy = coin.avgBuy > 0 ? ((target.targetPrice / coin.avgBuy) - 1) * 100 : 0;
          return { ...target, pct, pctOfVault, vaultPct, vaultCoins, coinsToSell, salesValue, gainFromAth, gainFromCurrent, gainFromBuy };
        });
      }, [selectedVaultCoin, vaultTargets, portfolioSummary, sellAllocation]);

      // Profit calculator (uses sellAllocation + levelFilters + vault super high)
      const profitBreakdown = useMemo(() => {
        const breakdown = {};
        portfolioSummary.forEach(coin => {
          const targets = exitTargets[coin.symbol] || [];
          const alloc = (sellAllocation[coin.symbol] || 65) / 100;
          const tradeableCoins = coin.coins * alloc;
          const filter = getLevelFilter(coin.symbol);
          let totalSales = 0;
          let salesLowMinus = 0, salesLow = 0, salesMid = 0, salesHigh = 0, salesHighPlus = 0, salesSuperHigh = 0;
          targets.forEach(target => {
            const val = tradeableCoins * (target.percentToSell / 100) * target.targetPrice;
            if (target.level === 'LOW-') salesLowMinus += val;
            else if (target.level === 'LOW') salesLow += val;
            else if (target.level === 'MID') salesMid += val;
            else if (target.level === 'HIGH') salesHigh += val;
            else if (target.level === 'HIGH+') salesHighPlus += val;
            if (filter[target.level]) totalSales += val;
          });
          // Add vault sales - match button to display name:
          // vault SUPER_HIGH (displayed "HIGH+") → controlled by filter['HIGH+'] (+HIGH button)
          // vault END_GAME (displayed "SUPER HIGH") → controlled by filter.SUPER_HIGH (SUPER HIGH button)
          const vTargets = vaultTargets[coin.symbol] || [];
          vTargets.forEach(vt => {
            if (vt.targetPrice > 0) {
              const vaultRelPct = vt.percentOfPortfolio || 0;
              const absolutePct = vaultRelPct * getVaultPercent(coin.symbol) / 100;
              const pctCoins = coin.coins * (absolutePct / 100);
              const val = pctCoins * vt.targetPrice;
              if (vt.level === 'SUPER_HIGH') {
                salesHighPlus += val;
                if (filter['HIGH+']) totalSales += val;
              } else if (vt.level === 'END_GAME') {
                salesSuperHigh += val;
                if (filter.SUPER_HIGH) totalSales += val;
              }
            }
          });
          const originalInvestment = coin.coins * coin.avgBuy;
          const totalGainPercent = originalInvestment > 0 ? ((totalSales / originalInvestment) - 1) * 100 : 0;
          const tax = (totalSales * profitDistribution.tax) / 100;
          breakdown[coin.symbol] = { sales: totalSales, totalGainPercent, neto: totalSales - tax, tax, originalInvestment, salesLowMinus, salesLow, salesMid, salesHigh, salesHighPlus, salesSuperHigh };
        });
        return breakdown;
      }, [portfolioSummary, exitTargets, profitDistribution, sellAllocation, levelFilters, vaultTargets]);

      // Filtered NETO based on active levelFilters - drives goals tab dynamically
      const filteredNeto = useMemo(() => {
        return Object.values(profitBreakdown).reduce((s, c) => s + c.neto, 0);
      }, [profitBreakdown]);

      // Active levels summary for display in goals tab
      const activeLevelsSummary = useMemo(() => {
        const levelNames = { 'LOW-': 'LOW-', LOW: 'LOW', MID: 'MID', HIGH: 'HIGH', 'HIGH+': 'HIGH+', SUPER_HIGH: 'SUPER HIGH' };
        const allLevels = ['LOW-', 'LOW', 'MID', 'HIGH', 'HIGH+', 'SUPER_HIGH'];
        // Check which levels are globally on (all coins have them enabled)
        const globalOn = allLevels.filter(level =>
          portfolioSummary.every(c => (getLevelFilter(c.symbol))[level])
        );
        const globalOff = allLevels.filter(level =>
          portfolioSummary.every(c => !(getLevelFilter(c.symbol))[level])
        );
        return { globalOn, globalOff, levelNames, allLevels };
      }, [portfolioSummary, levelFilters]);

      // CAPLDR Data
      const capldrData = useMemo(() => {
        const monthlyIncome = capldrIncome.reduce((s, i) => s + (i.monthly || 0), 0);
        const toDividends = monthlyIncome * (capldrSettings.dividendPercent / 100);
        const toAssets = monthlyIncome * (capldrSettings.assetsPercent / 100);

        const cryptoAssetsValue = totalPortfolioValue;
        // holdValue = actual vault value from vault tab (per-coin vault % * current price)
        const holdValue = portfolioSummary.reduce((s, c) => s + c.coins * (getVaultPercent(c.symbol) / 100) * c.current, 0);
        const tradeableValue = cryptoAssetsValue - holdValue;

        const totalExpectedSales = Object.values(profitBreakdown).reduce((s, b) => s + b.sales, 0);
        const totalExpectedNeto = Object.values(profitBreakdown).reduce((s, b) => s + b.neto, 0);

        const availableForProtection = totalExpectedNeto * (capldrSettings.deRiskPercent / 100);
        const yearsOfInsurance = capldrSettings.insurancePremium > 0 ?
          availableForProtection / (capldrSettings.insurancePremium * 12) : 0;
        const projectedCashValue5yr = capldrSettings.insuranceCashValue *
          Math.pow(1 + capldrSettings.insuranceGrowthRate / 100, 5) +
          (capldrSettings.insurancePremium * 12 * 5 * 0.7);
        const projectedCashValue10yr = capldrSettings.insuranceCashValue *
          Math.pow(1 + capldrSettings.insuranceGrowthRate / 100, 10) +
          (capldrSettings.insurancePremium * 12 * 10 * 0.75);

        const maxLeverage = projectedCashValue5yr * 0.90;
        const leverageCost = capldrSettings.leverageAmount * (capldrSettings.leverageRate / 100);
        const leverageForAssets = capldrSettings.leverageAmount - leverageCost;

        const annualIncome = monthlyIncome * 12;
        const annualDividends = toDividends * 12;
        const annualToAssets = toAssets * 12;

        return {
          monthlyIncome, toDividends, toAssets,
          cryptoAssetsValue, holdValue, tradeableValue,
          totalExpectedSales, totalExpectedNeto,
          availableForProtection, yearsOfInsurance,
          projectedCashValue5yr, projectedCashValue10yr,
          maxLeverage, leverageCost, leverageForAssets,
          annualIncome, annualDividends, annualToAssets,
        };
      }, [capldrIncome, capldrSettings, totalPortfolioValue, profitBreakdown, portfolioSummary, sellAllocation]);

      // Formatters
      const fmt = (num, d = 2) => (num || 0).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
      const fmtC = (num) => `$${fmt(num)}`;
      const fmtP = (num) => `${fmt(num)}%`;
      // Format date from YYYY-MM-DD to DD/MM/YYYY
      const fmtDate = (dateStr) => {
        if (!dateStr) return '';
        const parts = String(dateStr).split('-');
        if (parts.length !== 3) return dateStr;
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
      };

      // Stablecoins filter
      const STABLECOINS = ['USDC', 'USDT', 'DAI', 'BUSD', 'TUSD'];
      const [hideStablecoins, setHideStablecoins] = useState(false);

      // Handlers
      const [showAddCoinForm, setShowAddCoinForm] = useState(false);
      const [newCoinForm, setNewCoinForm] = useState({ symbol: '', coingeckoId: '', manualCoins: '', manualAvgBuy: '' });
      const addCoin = () => {
        const sym = (newCoinForm.symbol || '').toUpperCase().trim();
        if (!sym) return;
        if (coins.find(c => c.symbol === sym)) { alert(`${sym} כבר קיים בתיק`); return; }
        updateCoinMeta(sym, {
          status: 'active',
          coingeckoId: (newCoinForm.coingeckoId || '').trim(),
          manualAvgBuy: parseFloat(newCoinForm.manualAvgBuy) || 0,
          manualCoins: parseFloat(newCoinForm.manualCoins) || 0,
        });
        setNewCoinForm({ symbol: '', coingeckoId: '', manualCoins: '', manualAvgBuy: '' });
        setShowAddCoinForm(false);
      };
      const removeCoin = (symbol) => {
        if (!confirm(`להסיר את ${symbol} מהתיק?`)) return;
        setCoinMeta(m => { const next = { ...m }; delete next[symbol]; return next; });
        if (selectedCoin === symbol) setSelectedCoin(coins[0]?.symbol || '');
      };
      const updateCoin = (symbol, field, value) => {
        // status, note → update coinMeta; avgBuy, coins → update manual overrides
        if (field === 'status' || field === 'note') {
          updateCoinMeta(symbol, { [field]: value });
        } else if (field === 'avgBuy') {
          updateCoinMeta(symbol, { manualAvgBuy: value });
        } else if (field === 'coins') {
          updateCoinMeta(symbol, { manualCoins: value });
        }
      };
      const addExitTarget = () => {
        if (!selectedCoin) return;
        setExitTargets(prev => ({ ...prev, [selectedCoin]: [...(prev[selectedCoin] || []), { level: 'MID', targetPrice: 0, percentToSell: 0, fib: 0 }] }));
      };
      const [lastDeletedTarget, setLastDeletedTarget] = useState(null);
      const removeExitTarget = (idx) => {
        setExitTargets(prev => {
          const coin = selectedCoin;
          const deleted = prev[coin]?.[idx];
          if (deleted) setLastDeletedTarget({ coin, idx, data: { ...deleted }, timestamp: Date.now() });
          return { ...prev, [coin]: prev[coin].filter((_, i) => i !== idx) };
        });
      };
      const undoDeleteTarget = () => {
        if (!lastDeletedTarget) return;
        const { coin, idx, data } = lastDeletedTarget;
        setExitTargets(prev => {
          const arr = [...(prev[coin] || [])];
          arr.splice(idx, 0, data);
          return { ...prev, [coin]: arr };
        });
        setLastDeletedTarget(null);
      };
      const moveExitTarget = (idx, dir) => {
        setExitTargets(prev => {
          const arr = [...(prev[selectedCoin] || [])];
          const newIdx = idx + dir;
          if (newIdx < 0 || newIdx >= arr.length) return prev;
          [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
          return { ...prev, [selectedCoin]: arr };
        });
      };
      const [exitClipboard, setExitClipboard] = useState(null);
      const copyExitTarget = (idx) => {
        const item = exitTargets[selectedCoin]?.[idx];
        if (item) setExitClipboard({ ...item });
      };
      const pasteExitTarget = () => {
        if (!exitClipboard || !selectedCoin) return;
        setExitTargets(prev => ({ ...prev, [selectedCoin]: [...(prev[selectedCoin] || []), { ...exitClipboard }] }));
      };
      const updateExitTarget = (idx, field, value) => setExitTargets(prev => ({ ...prev, [selectedCoin]: prev[selectedCoin].map((t, i) => i === idx ? { ...t, [field]: value } : t) }));
      const updatePD = (field, value) => setProfitDistribution(prev => ({ ...prev, [field]: Math.max(0, Math.min(100, value)) }));

      // CAPLDR Handlers
      const addIncomeSource = () => {
        setCapldrIncome(prev => [...prev, { source: 'מקור חדש', monthly: 0 }]);
      };
      const removeIncomeSource = (idx) => {
        setCapldrIncome(prev => prev.filter((_, i) => i !== idx));
      };
      const updateIncomeSource = (idx, field, value) => {
        setCapldrIncome(prev => prev.map((item, i) => i === idx ? { ...item, [field]: value } : item));
      };
      const updateCapldrSetting = (key, value) => {
        setCapldrSettings(prev => ({ ...prev, [key]: value }));
      };

      // Transaction Handlers
      const addTransaction = (tx) => {
        setTransactions(prev => [...prev, { ...tx, id: Date.now() }]);
      };
      const updateTransaction = (id, patch) => {
        setTransactions(prev => prev.map(t => t.id === id ? { ...t, ...patch } : t));
      };
      const deleteTransaction = (id) => {
        setTransactions(prev => prev.filter(t => t.id !== id));
      };
      const exportToGoogleSheets = (rows2D, title) => {
        const cellStyle = 'text-align:center;vertical-align:middle;white-space:normal;word-wrap:break-word;direction:rtl;';
        const headerStyle = cellStyle + 'font-weight:bold;background-color:#d9ead3;';
        const html = '<meta charset="utf-8"><table dir="rtl" style="direction:rtl;">' +
          rows2D.map((r, ri) => '<tr>' + r.map(c => {
            const tag = ri === 0 ? 'th' : 'td';
            const st = ri === 0 ? headerStyle : cellStyle;
            const escaped = String(c).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            return '<' + tag + ' style="' + st + '">' + escaped + '</' + tag + '>';
          }).join('') + '</tr>').join('') + '</table>';
        const tsv = rows2D.map(r => r.map(c => String(c).replace(/\t/g, ' ')).join('\t')).join('\n');
        const doCopy = async () => {
          try {
            const htmlBlob = new Blob([html], {type: 'text/html'});
            const textBlob = new Blob([tsv], {type: 'text/plain'});
            await navigator.clipboard.write([new ClipboardItem({'text/html': htmlBlob, 'text/plain': textBlob})]);
            return true;
          } catch(e1) {
            try {
              await navigator.clipboard.writeText(tsv);
              return true;
            } catch(e2) {
              try {
                const ta = document.createElement('textarea');
                ta.value = tsv;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                return true;
              } catch(e3) {
                return false;
              }
            }
          }
        };
        doCopy().then(ok => {
          if (ok) {
            const go = confirm('הנתונים הועתקו ללוח.\n\nלחץ OK כדי לפתוח גיליון Google Sheets חדש,\nואז הדבק עם Ctrl+V (או Cmd+V).');
            if (go) window.open('https://docs.google.com/spreadsheets/create', '_blank');
          } else {
            const csv = rows2D.map(r => r.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',')).join('\n');
            const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = (title || 'export') + '.csv';
            a.click();
            alert('ההעתקה ללוח נכשלה. הקובץ הורד כ-CSV.\nפתח Google Sheets ובחר: קובץ > ייבוא');
          }
        });
      };
      const exportCSV = (txs, filename) => {
        const headers = ['מטבע','סוג','ארנק','תאריך','כמות','מחיר ממוצע','סה"כ'];
        const rows = txs.map(t => [t.coin, t.type, t.wallet, t.date, t.amount.toFixed(2), t.avgPrice.toFixed(6), t.total.toFixed(2)]);
        exportToGoogleSheets([headers, ...rows], filename ? filename.replace('.csv','') : 'transactions');
      };

      const fetchHistoricalChart = useCallback(async (coin) => {
        setChartLoading(true);
        try {
          const coinId = coinGeckoIds[coin];
          if (!coinId) return;
          const days = chartPeriod === 'max' ? 'max' : chartPeriod;
          const response = await fetch(
            `https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${days}`
          );
          if (!response.ok) throw new Error('Failed to fetch chart');
          const data = await response.json();
          setChartData(data.prices || []);
        } catch (err) {
          setChartData([]);
        } finally {
          setChartLoading(false);
        }
      }, [chartPeriod]);

      // ==================== RENDER ====================
      return (
        <div dir="rtl" className="min-h-screen bg-gray-900 text-gray-100" style={{padding: '16px 8px'}}>
          <div style={{maxWidth: '1400px', margin: '0 auto'}}>

            {/* Header */}
            <div className="flex justify-between items-center mb-4">
              <div className="flex gap-2">
                <button onClick={exportBackup} className="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-gray-300" title="Download backup">
                  Backup
                </button>
                <label className="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-gray-300 cursor-pointer" title="Restore from backup file">
                  Restore
                  <input type="file" accept=".json" className="hidden" onChange={e => { if (e.target.files[0]) importBackup(e.target.files[0]); }} />
                </label>
              </div>
              <h1 className="text-2xl md:text-4xl font-bold text-center text-cyan-400 flex-1">
                Crypto Exit Strategy
              </h1>
              <div style={{width:'130px'}}></div>
            </div>

            {/* Market Overview - Feature 2 */}
            {marketData.totalMcap > 0 && (
              <div className="bg-gray-800 rounded-lg p-3 mb-4 flex flex-wrap gap-4 justify-center text-xs md:text-sm">
                <span>BTC: <b className="text-orange-400">${marketData.btcPrice.toLocaleString('en-US', {maximumFractionDigits:0})}</b> <span className={marketData.btc24h >= 0 ? 'text-green-400' : 'text-red-400'}>{marketData.btc24h >= 0 ? '+' : ''}{marketData.btc24h.toFixed(1)}%</span></span>
