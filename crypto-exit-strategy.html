                        </div>
                        <div className="text-xs text-gray-400 mt-2 space-y-0.5">
                          <div>יתרה צפויה סוף חודש: <span className={endOfMonthILBalance >= 0 ? 'text-green-400' : 'text-red-400'}>{fmtILS(endOfMonthILBalance)}</span></div>
                          {isCurrentMonth ? (
                            <React.Fragment>
                              <div>סטטוס נוכחי: {fmtILS(effectiveOpeningBalance)}</div>
                              <div>הכנסות שנותרו: {fmtILS(ilRemainingIncome)} | הוצאות שנותרו: {fmtILS(-ilRemainingExpenses)}</div>
                            </React.Fragment>
                          ) : (
                            <div>יתרת פתיחה {fmtILS(effectiveOpeningBalance)} + נטו {fmtILS(ilMonthIncome - ilMonthExpenses)}</div>
                          )}
                        </div>
                      </div>
                      {/* Abroad gap - based on current balances vs remaining expenses */}
                      <div className={`rounded-lg p-5 border-2 ${thSupplyGapILS >= 0 ? 'border-green-500 bg-green-900/30' : 'border-orange-500 bg-orange-900/30'}`}>
                        <div className="flex items-center justify-between mb-2">
                          <span className="text-sm font-bold text-orange-300">חו"ל - פער להשלמה {month.name}</span>
                          <span className="text-xs text-gray-400">יתרות חשבונות - הוצאות שנותרו</span>
                        </div>
                        <div className="flex items-baseline gap-3">
                          <span className={`text-3xl font-black ${thSupplyGapILS >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                            {fmtILS(thSupplyGapILS)}
                          </span>
                          <span className={`text-lg font-bold ${thSupplyGapUSD >= 0 ? 'text-green-300' : 'text-red-300'}`}>
                            ({fmtUSD(thSupplyGapUSD)})
                          </span>
                        </div>
                        <div className="text-xs text-gray-400 mt-2 space-y-0.5">
                          <div>יתרות חשבונות תאילנד: {fmtILS(thBalanceILS)}</div>
                          <div>הוצאות שנותרו לתשלום: {fmtILS(-thRemainingExp)}</div>
                          <div>הוצאות ששולמו: {fmtILS(-thPaidExp)}</div>
                        </div>
                      </div>
                    </div>

                    {/* 3 Dashboard Tables like Excel */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mt-3">
                      {/* Table 1: חיתוך מצב בנק ישראל */}
                      <div className="border border-blue-500 rounded overflow-hidden">
                        <div className="bg-blue-900 px-3 py-2 text-center">
                          <span className="text-blue-200 font-bold text-sm">
                            {isCurrentMonth ? 'סטטוס בנק ישראל - סוף ' + month.name : 'חיתוך מצב בנק ישראל - סוף ' + month.name}
                          </span>
                        </div>
                        <table className="w-full text-sm">
                          <tbody>
                            {isCurrentMonth && (
                              <tr className="border-b border-gray-700 bg-yellow-900/30">
                                <td className="px-3 py-1.5 text-yellow-400 text-xs font-bold">סטטוס נוכחי בבנק</td>
                                <td className={`px-3 py-1.5 font-bold text-left ${effectiveOpeningBalance >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(effectiveOpeningBalance)}</td>
                              </tr>
                            )}
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-gray-400 text-xs">{isCurrentMonth ? 'הכנסות שנותרו' : 'הכנסות ישראל'}</td>
                              <td className="px-3 py-1.5 text-green-400 font-bold text-left">{fmtILS(ilMonthIncome)}</td>
                            </tr>
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-gray-400 text-xs">{isCurrentMonth ? 'הוצאות שנותרו' : 'הוצאות ישראל'}</td>
                              <td className="px-3 py-1.5 text-red-400 font-bold text-left">{fmtILS(-ilMonthExpenses)}</td>
                            </tr>
                            {isCurrentMonth && (
                              <tr className="border-b border-gray-700 bg-gray-800/50">
                                <td className="px-3 py-1.5 text-gray-500 text-xs">שולם/התקבל כבר</td>
                                <td className="px-3 py-1.5 text-gray-500 font-bold text-left text-xs">{fmtILS(ilReceivedIncome)} / {fmtILS(-ilPaidExpenses)}</td>
                              </tr>
                            )}
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-blue-400 text-xs font-bold">יתרה צפויה סוף חודש</td>
                              <td className={`px-3 py-1.5 font-bold text-left ${endOfMonthILBalance >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(endOfMonthILBalance)}</td>
                            </tr>
                            <tr className="border-b border-gray-700 bg-gray-800">
                              <td className="px-3 py-1.5 text-yellow-400 text-xs font-bold">פער מהמסגרת סוף חודש</td>
                              <td className={`px-3 py-1.5 font-bold text-left ${gapToFrameworkILS >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(gapToFrameworkILS)}</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>

                      {/* Table 2: חיתוך מצב חו"ל - יתרות מול הוצאות שנותרו */}
                      <div className="border border-orange-500 rounded overflow-hidden">
                        <div className="bg-gray-700 px-3 py-2 text-center">
                          <span className="text-orange-300 font-bold text-sm">סטטוס חו"ל - {month.name}</span>
                        </div>
                        <table className="w-full text-sm">
                          <tbody>
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-gray-400 text-xs">יתרות חשבונות תאילנד</td>
                              <td className="px-3 py-1.5 text-green-400 font-bold text-left">{fmtILS(thBalanceILS)}</td>
                            </tr>
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-gray-400 text-xs">הוצאות ששולמו</td>
                              <td className="px-3 py-1.5 text-gray-400 font-bold text-left">{fmtILS(-thPaidExp)}</td>
                            </tr>
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-gray-400 text-xs">הוצאות שנותרו</td>
                              <td className="px-3 py-1.5 text-red-400 font-bold text-left">{fmtILS(-thRemainingExp)}</td>
                            </tr>
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-gray-400 text-xs">סה"כ הוצאות חו"ל</td>
                              <td className="px-3 py-1.5 text-red-400 font-bold text-left">{fmtILS(-(thPaidExp + thRemainingExp))}</td>
                            </tr>
                            <tr className="bg-gray-800">
                              <td className="px-3 py-1.5 text-orange-400 text-xs font-bold">פער להשלמה</td>
                              <td className={`px-3 py-1.5 font-bold text-left ${thSupplyGapILS >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(thSupplyGapILS)}</td>
                            </tr>
                            <tr className="bg-gray-800 border-t border-gray-700">
                              <td className="px-3 py-1.5 text-gray-500 text-xs">נטו הכנסות-הוצאות</td>
                              <td className={`px-3 py-1.5 font-bold text-left text-xs ${thMonthNet >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(thMonthNet)}</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>

                      {/* Table 3: שורה תחתונה - פער מהמסגרת */}
                      <div className="border border-yellow-500 rounded overflow-hidden">
                        <div className="bg-yellow-900 px-3 py-2 text-center">
                          <span className="text-yellow-200 font-bold text-sm">שורה תחתונה {month.name} - פער מהמסגרת</span>
                        </div>
                        <table className="w-full text-sm">
                          <tbody>
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-gray-400 text-xs">מסגרת בנק</td>
                              <td className="px-3 py-1.5 text-gray-300 font-bold text-left">{fmtILS(BANK_FRAMEWORK)}</td>
                            </tr>
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-yellow-400 text-xs font-bold">פער מהמסגרת ש"ח</td>
                              <td className={`px-3 py-1.5 font-bold text-left text-lg ${gapToFrameworkILS >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(gapToFrameworkILS)}</td>
                            </tr>
                            <tr className="border-b border-gray-700">
                              <td className="px-3 py-1.5 text-yellow-400 text-xs font-bold">פער מהמסגרת $</td>
                              <td className={`px-3 py-1.5 font-bold text-left text-lg ${gapToFrameworkUSD >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtUSD(gapToFrameworkUSD)}</td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>

                    {/* אינדיקציית פער תכנון מול ביצוע */}
                    {(planGapIL !== 0 || planGapTH !== 0) && (
                      <div className="mt-3 flex gap-3">
                        {planGapIL !== 0 && (
                          <div className={`flex-1 rounded p-2 border ${planGapIL >= 0 ? 'border-green-600 bg-green-900/20' : 'border-red-600 bg-red-900/20'} flex items-center justify-between`}>
                            <span className="text-xs text-gray-300">פער תכנון vs ביצוע <b className="text-blue-300">ישראל</b></span>
                            <span className={`font-bold text-sm ${planGapIL >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(planGapIL)}</span>
                          </div>
                        )}
                        {planGapTH !== 0 && (
                          <div className={`flex-1 rounded p-2 border ${planGapTH >= 0 ? 'border-green-600 bg-green-900/20' : 'border-red-600 bg-red-900/20'} flex items-center justify-between`}>
                            <span className="text-xs text-gray-300">פער תכנון vs ביצוע <b className="text-orange-300">חו"ל</b></span>
                            <span className={`font-bold text-sm ${planGapTH >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(planGapTH)}</span>
                          </div>
                        )}
                      </div>
                    )}

                    {/* טבלת תכנון מול ביצוע - מפוצלת ישראל / חו"ל */}
                    {(() => {
                      // Compute planned vs effective totals split by region
                      // תכנון מקורי = planned value of items that existed BEFORE the month started
                      // מצב נוכחי = effective value (actual if exists, else planned) of ALL items
                      // פער = difference. Items added during the month show only in "מצב נוכחי"
                      let ilPlanInc = 0, ilPlanExp = 0, ilActInc = 0, ilActExp = 0;
                      let thPlanInc = 0, thPlanExp = 0, thActInc = 0, thActExp = 0;
                      let ilNewInc = 0, ilNewExp = 0, thNewInc = 0, thNewExp = 0;
                      month.weeks.forEach(w => w.items.forEach(item => {
                        // Item is "original" if it was NOT added during the month
                        const isNew = !!item.addedDuringMonth;
                        // תכנון מקורי: for original items use planned (or originalPlanned if edited)
                        const pVal = isNew ? 0 : (item.originalPlanned != null ? item.originalPlanned : (item.planned || 0));
                        // מצב נוכחי: actual if filled, else planned
                        const eVal = item.actual != null ? item.actual : (item.planned != null ? item.planned : 0);
                        const isIL = item.region === 'israel';

                        if (item.type === 'income') {
                          if (isIL) { ilPlanInc += Math.abs(pVal); ilActInc += Math.abs(eVal); if (isNew) ilNewInc += Math.abs(eVal); }
                          else { thPlanInc += Math.abs(pVal); thActInc += Math.abs(eVal); if (isNew) thNewInc += Math.abs(eVal); }
                        } else if (item.type === 'expense') {
                          if (isIL) { ilPlanExp += Math.abs(pVal); ilActExp += Math.abs(eVal); if (isNew) ilNewExp += Math.abs(eVal); }
                          else { thPlanExp += Math.abs(pVal); thActExp += Math.abs(eVal); if (isNew) thNewExp += Math.abs(eVal); }
                        }
                      }));
                      // הוספת מקורות THB מהדשבורד להכנסות חו"ל
                      const thDashInc = getThSources(cfSelectedMonth).reduce((s, src) => s + (src.ils || 0), 0);
                      thPlanInc += thDashInc;
                      // (ביצוע THB = אותו דבר כי הדשבורד הוא תמיד "בפועל")
                      thActInc += thDashInc;

                      const ilPlanNet = ilPlanInc - ilPlanExp;
                      const ilActNet = ilActInc - ilActExp;
                      const thPlanNet = thPlanInc - thPlanExp;
                      const thActNet = thActInc - thActExp;
                      const hasActual = month.weeks.some(w => w.items.some(i => i.actual != null));

                      return (
                    <div className="mt-3 border border-purple-500 rounded overflow-hidden">
                      <div className="bg-purple-900 px-3 py-2 text-center">
                        <span className="text-purple-200 font-bold text-sm">תכנון מול ביצוע - {month.name}</span>
                      </div>
                      <table className="w-full text-sm">
                        <thead className="bg-gray-700">
                          <tr>
                            <th className="px-3 py-1.5 text-right text-xs"></th>
                            <th className="px-3 py-1.5 text-center text-xs">תכנון מקורי</th>
                            <th className="px-3 py-1.5 text-center text-xs">מצב נוכחי</th>
                            <th className="px-3 py-1.5 text-center text-xs">פער</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr className="bg-blue-900 bg-opacity-40"><td colSpan="4" className="px-3 py-1 text-xs font-bold text-blue-300">ישראל</td></tr>
                          <tr className="border-b border-gray-700">
                            <td className="px-3 py-1 text-xs text-gray-400 pr-6">הכנסות</td>
                            <td className="px-3 py-1 text-center text-green-400 font-bold">{fmtILS(ilPlanInc)}</td>
                            <td className="px-3 py-1 text-center text-green-300 font-bold">{fmtILS(ilActInc)}</td>
                            <td className={`px-3 py-1 text-center font-bold ${(ilActInc - ilPlanInc) >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(ilActInc - ilPlanInc)}</td>
                          </tr>
                          <tr className="border-b border-gray-700">
                            <td className="px-3 py-1 text-xs text-gray-400 pr-6">הוצאות</td>
                            <td className="px-3 py-1 text-center text-red-400 font-bold">{fmtILS(-ilPlanExp)}</td>
                            <td className="px-3 py-1 text-center text-red-300 font-bold">{fmtILS(-ilActExp)}</td>
                            <td className={`px-3 py-1 text-center font-bold ${(ilActExp - ilPlanExp) <= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(ilPlanExp - ilActExp)}</td>
                          </tr>
                          {(ilNewInc > 0 || ilNewExp > 0) && (
                            <tr className="border-b border-gray-700 bg-cyan-900/20">
                              <td className="px-3 py-1 text-xs text-cyan-400 pr-6">מתוכם שורות שנוספו</td>
                              <td className="px-3 py-1 text-center text-gray-500">-</td>
                              <td className="px-3 py-1 text-center text-cyan-300 font-bold">{fmtILS(ilNewInc - ilNewExp)}</td>
                              <td className="px-3 py-1 text-center text-cyan-300 font-bold">{fmtILS(ilNewInc - ilNewExp)}</td>
                            </tr>
                          )}
                          <tr className="border-b border-gray-600 bg-gray-800">
                            <td className="px-3 py-1 text-xs text-purple-400 font-bold pr-6">נטו</td>
                            <td className={`px-3 py-1 text-center font-bold ${ilPlanNet >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(ilPlanNet)}</td>
                            <td className={`px-3 py-1 text-center font-bold ${ilActNet >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(ilActNet)}</td>
                            <td className={`px-3 py-1 text-center font-bold ${(ilActNet - ilPlanNet) >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(ilActNet - ilPlanNet)}</td>
                          </tr>
                          <tr className="bg-orange-900 bg-opacity-40"><td colSpan="4" className="px-3 py-1 text-xs font-bold text-orange-300">חו"ל</td></tr>
                          <tr className="border-b border-gray-700">
                            <td className="px-3 py-1 text-xs text-gray-400 pr-6">הכנסות</td>
                            <td className="px-3 py-1 text-center text-green-400 font-bold">{fmtILS(thPlanInc)}</td>
                            <td className="px-3 py-1 text-center text-green-300 font-bold">{fmtILS(thActInc)}</td>
                            <td className={`px-3 py-1 text-center font-bold ${(thActInc - thPlanInc) >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(thActInc - thPlanInc)}</td>
                          </tr>
                          <tr className="border-b border-gray-700">
                            <td className="px-3 py-1 text-xs text-gray-400 pr-6">הוצאות</td>
                            <td className="px-3 py-1 text-center text-red-400 font-bold">{fmtILS(-thPlanExp)}</td>
                            <td className="px-3 py-1 text-center text-red-300 font-bold">{fmtILS(-thActExp)}</td>
                            <td className={`px-3 py-1 text-center font-bold ${(thActExp - thPlanExp) <= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(thPlanExp - thActExp)}</td>
                          </tr>
                          {(thNewInc > 0 || thNewExp > 0) && (
                            <tr className="border-b border-gray-700 bg-cyan-900/20">
                              <td className="px-3 py-1 text-xs text-cyan-400 pr-6">מתוכם שורות שנוספו</td>
                              <td className="px-3 py-1 text-center text-gray-500">-</td>
                              <td className="px-3 py-1 text-center text-cyan-300 font-bold">{fmtILS(thNewInc - thNewExp)}</td>
                              <td className="px-3 py-1 text-center text-cyan-300 font-bold">{fmtILS(thNewInc - thNewExp)}</td>
                            </tr>
                          )}
                          <tr className="bg-gray-800">
                            <td className="px-3 py-1 text-xs text-purple-400 font-bold pr-6">נטו</td>
                            <td className={`px-3 py-1 text-center font-bold ${thPlanNet >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(thPlanNet)}</td>
                            <td className={`px-3 py-1 text-center font-bold ${thActNet >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(thActNet)}</td>
                            <td className={`px-3 py-1 text-center font-bold ${(thActNet - thPlanNet) >= 0 ? 'text-green-400' : 'text-red-400'}`}>{fmtILS(thActNet - thPlanNet)}</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                      );
                    })()}

                    {/* מקורות מימון חו"ל */}
                    <div className="mt-3 border border-orange-500 rounded overflow-hidden">
                      <div className="bg-orange-900 px-3 py-2 flex items-center justify-between">
                        <span className="text-orange-200 font-bold text-sm">מקורות מימון חו"ל - {month.name}</span>
                        <div className="flex gap-3 text-xs text-orange-300">
                          <span>THB/ILS: {cfExchangeRates.THBILS.toFixed(3)}</span>
                          <span>USD/ILS: {cfExchangeRates.USDILS.toFixed(2)}</span>
                          <span>SGD/ILS: {cfExchangeRates.SGDILS.toFixed(2)}</span>
                        </div>
                      </div>
                      <table className="w-full text-sm">
                        <thead className="bg-gray-700">
                          <tr>
                            <th className="px-3 py-1.5 text-right text-xs">מקור</th>
                            <th className="px-3 py-1.5 text-right text-xs">THB</th>
                            <th className="px-3 py-1.5 text-right text-xs">ש"ח</th>
                            <th className="px-3 py-1.5 text-right text-xs">$ USD</th>
                            <th className="px-3 py-1.5 text-right text-xs">$ SGD</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-700">
                          {getThSources(cfSelectedMonth).map((src, sIdx) => {
                            const cur = src.currency || 'THB';
                            const isSGD = cur === 'SGD';
                            const rate = isSGD ? cfExchangeRates.SGDILS : cfExchangeRates.THBILS;
                            const ilsVal = (src.baht || 0) * rate;
                            return (
                            <tr key={sIdx} className="hover:bg-gray-700">
                              <td className="px-3 py-1 text-xs text-orange-300 font-semibold">{src.name}</td>
                              {/* THB column */}
                              <td className="px-3 py-1">
                                {isSGD ? (
                                  <span className="text-gray-500 text-xs">{cfExchangeRates.THBILS > 0 ? Math.round(ilsVal / cfExchangeRates.THBILS).toLocaleString('en-US') : '-'}</span>
                                ) : (
                                  <NumInput value={src.baht || ''}
                                    onChange={e => updateThSource(cfSelectedMonth, sIdx, 'baht', parseFloat(e.target.value) || 0)}
                                    className="bg-gray-800 text-white px-1 py-0.5 rounded w-16 text-xs border border-gray-600 focus:border-orange-400 outline-none" />
                                )}
                              </td>
                              {/* ILS column */}
                              <td className="px-3 py-1">
                                <NumInput value={Math.round(ilsVal) || ''}
                                  onChange={e => {
                                    const newIls = parseFloat(e.target.value) || 0;
                                    const newForeign = rate > 0 ? Math.round(newIls / rate) : 0;
                                    updateThSource(cfSelectedMonth, sIdx, 'baht', newForeign);
                                  }}
                                  className="bg-gray-800 text-white px-1 py-0.5 rounded w-20 text-xs border border-gray-600 focus:border-cyan-400 outline-none" />
                              </td>
                              {/* USD column */}
                              <td className="px-3 py-1">
                                <span className="text-gray-500 text-xs">{cfExchangeRates.USDILS > 0 ? Math.round(ilsVal / cfExchangeRates.USDILS).toLocaleString('en-US') : '-'}</span>
                              </td>
                              {/* SGD column */}
                              <td className="px-3 py-1">
                                {isSGD ? (
                                  <NumInput value={src.baht || ''}
                                    onChange={e => updateThSource(cfSelectedMonth, sIdx, 'baht', parseFloat(e.target.value) || 0)}
                                    className="bg-gray-800 text-white px-1 py-0.5 rounded w-16 text-xs border border-gray-600 focus:border-purple-400 outline-none" />
                                ) : (
                                  <span className="text-gray-500 text-xs">{cfExchangeRates.SGDILS > 0 ? Math.round(ilsVal / cfExchangeRates.SGDILS).toLocaleString('en-US') : '-'}</span>
                                )}
                              </td>
                            </tr>
                            );
                          })}
                          {(() => {
                            const sources = getThSources(cfSelectedMonth);
                            const totalIls = sources.reduce((s, src) => {
                              const cur = src.currency || 'THB';
                              const rate = cur === 'SGD' ? cfExchangeRates.SGDILS : cfExchangeRates.THBILS;
                              return s + (src.baht || 0) * rate;
                            }, 0);
                            return (
                          <tr className="bg-gray-800 font-bold">
                            <td className="px-3 py-1.5 text-xs text-orange-400">סה"כ מקורות חו"ל</td>
                            <td className="px-3 py-1.5 text-xs text-white">
                              -
                            </td>
                            <td className="px-3 py-1.5 text-xs text-white">
                              {fmtILS(totalIls)} ש"ח
                            </td>
                            <td className="px-3 py-1.5 text-xs text-white">
                              {cfExchangeRates.USDILS > 0 ? fmtUSD(Math.round(totalIls / cfExchangeRates.USDILS)) : '-'}
                            </td>
                            <td className="px-3 py-1.5 text-xs text-white">
                              {cfExchangeRates.SGDILS > 0 ? React.createElement('span', { style: { direction: 'ltr', unicodeBidi: 'embed' } }, Math.round(totalIls / cfExchangeRates.SGDILS).toLocaleString('en-US') + ' SGD') : '-'}
                            </td>
                          </tr>
                            );
                          })()}
                        </tbody>
                      </table>
                    </div>

                      return s + wIlIn - wIlEx;
                    }, 0);
                    const thDashboardIncomeForCum = getThSources(cfSelectedMonth).reduce((s, src) => s + (src.ils || 0), 0);

                      if (isCurrentMonth) {

                      const wThEx = w.items.filter(i => i.type === 'expense' && i.region === 'thailand').reduce((s2, i) => s2 + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0);
                      return s + wThIn - wThEx;
                    }, 0);

                                              cfUpdateItem(cfSelectedMonth, wIdx, iIdx, {
                                                description: desc, details, type, region, notes,

                                                actual: actualVal

                                      return rate > 0 ? (Math.abs(ilsAmount) / rate).toFixed(0) : null;

                                    const effectiveAmount = item.actual != null ? item.actual : item.planned;

                                    return (
                                      <tr key={iIdx} className="hover:bg-gray-700" style={getRowStyle(item)}>

                                            onChange={e => {
                                              setCashflowData(prev => {
                                                const updated = JSON.parse(JSON.stringify(prev));
                                                updated.months[cfSelectedMonth].weeks[wIdx].items[iIdx].description = e.target.value;
                                                return updated;
                                              });

                                            title={item.description || ''}
                                            className="bg-transparent text-white px-1 py-0.5 rounded w-full text-xs border border-gray-600 focus:border-yellow-400 outline-none min-w-28" />

                                        <td className="px-2 py-1.5">
                                          <MarqueeCell value={item.details || ''} placeholder="..."

                                                  if (item.type === 'income' && val < 0) val = Math.abs(val);
                                                  if (item.type === 'expense' && val > 0) val = -val;
                                                }
                                                setCashflowData(prev => {
                                                  const updated = JSON.parse(JSON.stringify(prev));
                                                  updated.months[cfSelectedMonth].weeks[wIdx].items[iIdx].planned = (val !== null && !isNaN(val)) ? val : null;
                                                  return updated;

                                              className="bg-gray-800 text-white px-1 py-0.5 rounded w-16 text-xs text-center border border-gray-600 focus:border-yellow-400 outline-none" />
                                            {item.planned != null && !isNaN(item.planned) && item.actual == null && <button onClick={() => {

                                                it.planned = null;
                                                return updated;

                                        <td className="px-2 py-1.5">
                                          <NumInput value={item.actual != null && !isNaN(item.actual) ? item.actual : ''}

                                              let val = e.target.value === '' ? null : parseFloat(e.target.value);
                                              if (val !== null && !isNaN(val)) {
                                                if (item.type === 'income' && val < 0) val = Math.abs(val);
                                                if (item.type === 'expense' && val > 0) val = -val;
                                              }
                                              setCashflowData(prev => {
                                                const updated = JSON.parse(JSON.stringify(prev));
                                                updated.months[cfSelectedMonth].weeks[wIdx].items[iIdx].actual = (val !== null && !isNaN(val)) ? val : null;
                                                return updated;

                                        </td>
                                        <td className={`px-2 py-1.5 text-xs text-center font-semibold ${gap != null ? (gap >= 0 ? 'text-green-400' : 'text-red-400') : 'text-gray-500'}`}>

                                        </td>
                                        <td className="px-2 py-1.5">
                                          <div className="flex items-center gap-1">
                                            <select value={item.foreignCurrency || 'USD'} onChange={e => {
                                              setCashflowData(prev => {
                                                const updated = JSON.parse(JSON.stringify(prev));
                                                updated.months[cfSelectedMonth].weeks[wIdx].items[iIdx].foreignCurrency = e.target.value;

                                              onChange={e => {
                                                const raw = e.target.value.replace(/[^0-9.\-]/g, '');
                                                const fcAmount = raw === '' ? null : parseFloat(raw);
                                                setCashflowData(prev => {
                                                  const updated = JSON.parse(JSON.stringify(prev));
                                                  const it = updated.months[cfSelectedMonth].weeks[wIdx].items[iIdx];
                                                  it.foreignAmount = isNaN(fcAmount) ? null : fcAmount;
                                                  if (fcAmount && !isNaN(fcAmount)) {
                                                    const cur = it.foreignCurrency || 'USD';
                                                    const rates = { 'USD': cfExchangeRates.USDILS, 'THB': cfExchangeRates.THBILS, 'SGD': cfExchangeRates.SGDILS };
                                                    const rate = rates[cur];
                                                    if (rate > 0) {
                                                      const ilsVal = Math.round(fcAmount * rate);
                                                      if (it.actual != null) { it.actual = it.type === 'income' ? ilsVal : -Math.abs(ilsVal); }

                                  <option value="income_thailand">הכנסה חו"ל</option>

                          {(() => {

                              if (moIdx === curMonthIdx) {
                                // Current month: remaining only (since opening = current status)
                                const inc = mo.weeks.reduce((s, w) => s + w.items.filter(i => i.type === 'income' && i.region === 'israel' && i.actual == null).reduce((ss, i) => ss + (i.planned || 0), 0), 0);

                              const prev = getOB(idx - 1);
                              return prev + calcILNetForMonth(mergedMonths[idx - 1], idx - 1);
                            };
                            return mergedMonths.map((m, mIdx) => {
                            const isFuture = mIdx > curMonthIdx;
                            const isCurOrPast = mIdx <= curMonthIdx;

                            }
                            const gapIL = mIncIL - mExpIL;
                            const gapTH = mIncTH - mExpTH;
                            const totalGap = gapIL + gapTH;
                            const openBal = getOB(mIdx);
                            const ilBalance = openBal + gapIL;
                            const vsFramework = ilBalance - FRAMEWORK;
                            const currentRealIdx = new Date().getMonth() - 1;
                            const isPast = mIdx < currentRealIdx;
                            const isCurrent = mIdx === currentRealIdx;

                                </td>
                                <td className="px-2 py-2 text-green-400 font-semibold text-xs">{fmtILS(mIncIL)}</td>
                                <td className="px-2 py-2 text-red-400 font-semibold text-xs">{fmtILS(-mExpIL)}</td>

                          })()}
                          {/* Totals row */}
                          {(() => {
                            const totIncIL = cashflowData.months.reduce((s, m) => s + m.weeks.reduce((ss, w) => ss + w.items.filter(i => i.type === 'income' && i.region === 'israel').reduce((sss, i) => sss + (i.actual != null ? i.actual : (i.planned || 0)), 0), 0), 0);
                            const totExpIL = cashflowData.months.reduce((s, m) => s + m.weeks.reduce((ss, w) => ss + w.items.filter(i => i.type === 'expense' && i.region === 'israel').reduce((sss, i) => sss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0), 0);
                            const totIncTHItems = cashflowData.months.reduce((s, m) => s + m.weeks.reduce((ss, w) => ss + w.items.filter(i => i.type === 'income' && i.region === 'thailand').reduce((sss, i) => sss + (i.actual != null ? i.actual : (i.planned || 0)), 0), 0), 0);
                            const totIncTHSources = cashflowData.months.reduce((s, m, mi) => s + getThSources(mi).reduce((ss, src) => ss + (src.ils || 0), 0), 0);
                            const totIncTH = totIncTHItems + totIncTHSources;
                            const totExpTH = cashflowData.months.reduce((s, m) => s + m.weeks.reduce((ss, w) => ss + w.items.filter(i => i.type === 'expense' && i.region === 'thailand').reduce((sss, i) => sss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0), 0);

                              const exp2 = mo2.weeks.reduce((ss, w) => ss + w.items.filter(i => i.type === 'expense' && i.region === 'israel').reduce((sss, i) => sss + Math.abs(i.actual != null ? i.actual : (i.planned || 0)), 0), 0);
                              return inc2 - exp2;
                            };
                            const getOB2 = (idx) => {
                              if (idx <= curIdx2) return cashflowData.months[idx]?.openingBalance || 0;
                              return getOB2(idx - 1) + calcILNet2(cashflowData.months[idx - 1]);
                            };

                                  {fmtILS(totSupplement)}
                                </td>

                          <div className="flex gap-2 flex-wrap items-center">
                            <button onClick={() => exportCSV(coinTxs, `transactions_${modalCoin}.csv`)}
                              className="px-3 py-1 bg-cyan-600 hover:bg-cyan-700 rounded text-white text-sm font-semibold">Google Sheets</button>
                            <button onClick={() => { setShowTxModal(false); setActiveTab('transactions'); setEditingTx({ id: null, coin: modalCoin, type: 'Buy', wallet: 'MEXC', date: new Date().toISOString().slice(0,10), amount: 0, avgPrice: 0, total: 0, note: '' }); }}
                              className="px-3 py-1 bg-green-600 hover:bg-green-700 rounded text-white text-sm font-semibold">+ הוסף טרנזקציה</button>
                          </div>
                          <div className="mobile-scroll">
                            <table className="w-full text-sm">
                              <thead className="bg-gray-700">
                                <tr>
                                  <th className="px-3 py-2 text-right">סוג</th>
                                  <th className="px-3 py-2 text-right">ארנק</th>
                                  <th className="px-3 py-2 text-right">תאריך</th>
                                  <th className="px-3 py-2 text-right">כמות</th>
                                  <th className="px-3 py-2 text-right">מחיר ממוצע ($)</th>
                                  <th className="px-3 py-2 text-right">סה"כ ($)</th>
                                  <th className="px-3 py-2 text-center">פעולות</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-gray-700">
                                {coinTxs.sort((a, b) => new Date(a.date) - new Date(b.date)).map(tx => (
                                  <tr key={tx.id} className={`hover:bg-gray-700 ${tx.type === 'Buy' ? 'bg-green-950 bg-opacity-10' : tx.type === 'Sell' ? 'bg-red-950 bg-opacity-10' : ''}`}>
                                    <td className="px-3 py-2">{tx.type}</td>
                                    <td className="px-3 py-2 text-sm">{tx.wallet}</td>
                                    <td className="px-3 py-2 text-sm">{fmtDate(tx.date)}</td>
                                    <td className="px-3 py-2 text-sm">{fmt(tx.amount)}</td>
                                    <td className="px-3 py-2 text-sm">{tx.avgPrice.toFixed(6)}</td>
                                    <td className="px-3 py-2 text-sm font-semibold">{fmtC(tx.total)}</td>
                                    <td className="px-3 py-2 text-center flex gap-1 justify-center">
                                      <button title="עריכה" onClick={() => { setShowTxModal(false); setActiveTab('transactions'); setEditingTx({...tx}); setTimeout(() => document.getElementById('txEditForm')?.scrollIntoView({behavior:'smooth', block:'center'}), 150); }} className="px-2 py-1 bg-blue-700 hover:bg-blue-800 rounded text-xs text-white cursor-pointer">✏</button>
                                      <button title="מחיקה" onClick={() => { if (confirm('האם למחוק את הטרנזקציה הזו?')) deleteTransaction(tx.id); }} className="px-2 py-1 bg-red-700 hover:bg-red-800 rounded text-xs text-white cursor-pointer">🗑</button>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        </>
                      );
                    })()}
                  </div>
                </div>
              </div>
            )}

            {/* Feature 3: Historical Price Chart Modal */}
            {chartModalCoin && (
              <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" onClick={() => setChartModalCoin(null)}>
                <div className="bg-gray-800 rounded-lg p-6 max-w-2xl w-full max-h-96 m-4 overflow-y-auto" onClick={(e) => e.stopPropagation()}>
                  <div className="flex justify-between items-center mb-4">
                    <div>
                      <h3 className="text-xl font-bold text-cyan-400">{chartModalCoin}</h3>
                      <p className="text-sm text-gray-400">מחיר נוכחי: {fmtC(currentPrices[chartModalCoin] || 0)}</p>
                    </div>
                    <button onClick={() => setChartModalCoin(null)} className="text-gray-400 hover:text-white text-2xl">×</button>
                  </div>

                  <div className="flex gap-2 mb-4 flex-wrap">
                    {['1', '7', '30', '90', '365', 'max'].map(period => (
                      <button key={period} onClick={() => { setChartPeriod(period); fetchHistoricalChart(chartModalCoin); }}
                        className={`px-3 py-1 rounded text-sm font-semibold transition-colors ${
                          chartPeriod === period ? 'bg-cyan-600 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'
                        }`}>
                        {period === '1' ? '1D' : period === '7' ? '1W' : period === '30' ? '1M' : period === '90' ? '3M' : period === '365' ? '1Y' : 'ALL'}
                      </button>
                    ))}
                  </div>

                  {chartLoading ? (
                    <div className="flex justify-center items-center h-64 text-gray-400">טוען...</div>
                  ) : chartData && chartData.length > 0 ? (
                    (() => {
                      const prices = chartData.map(p => p[1]);
                      const minPrice = Math.min(...prices);
                      const maxPrice = Math.max(...prices);
                      const range = maxPrice - minPrice || 1;
                      const w = 600, h = 300, padding = 40;
                      const graphW = w - padding * 2, graphH = h - padding * 2;

                      const points = chartData.map((p, i) => {
                        const x = padding + (i / Math.max(1, chartData.length - 1)) * graphW;
                        const y = padding + graphH - ((p[1] - minPrice) / range) * graphH;
                        return { x, y, price: p[1] };
                      });

                      const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
                      const lastPrice = prices[prices.length - 1];
                      const change = ((lastPrice - prices[0]) / prices[0]) * 100;

                      return (
                        <div>
                          <svg viewBox={`0 0 ${w} ${h}`} className="w-full border border-gray-700 rounded">
                            <defs>
                              <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" style={{stopColor: change >= 0 ? '#22c55e' : '#ef4444', stopOpacity: 0.3}} />
                                <stop offset="100%" style={{stopColor: change >= 0 ? '#22c55e' : '#ef4444', stopOpacity: 0}} />
                              </linearGradient>
                            </defs>
                            <rect x={padding} y={padding} width={graphW} height={graphH} fill="none" stroke="#374151" strokeWidth="1" />
                            <path d={pathD} stroke={change >= 0 ? '#22c55e' : '#ef4444'} strokeWidth="2" fill="none" />
                            <path d={`${pathD} L ${points[points.length-1].x} ${padding + graphH} L ${points[0].x} ${padding + graphH} Z`} fill="url(#chartGrad)" />
                            <text x={padding + 5} y={padding + 15} fill="#9ca3af" fontSize="10">${maxPrice.toFixed(4)}</text>
                            <text x={padding + 5} y={h - 5} fill="#9ca3af" fontSize="10">${minPrice.toFixed(4)}</text>
                          </svg>
                          <div className="flex justify-between mt-3 text-sm text-gray-300">
                            <span>מינימום: <b>${minPrice.toFixed(4)}</b></span>
                            <span>מקסימום: <b>${maxPrice.toFixed(4)}</b></span>
                            <span className={change >= 0 ? 'text-green-400' : 'text-red-400'}>שינוי: <b>{change >= 0 ? '+' : ''}{change.toFixed(2)}%</b></span>
                          </div>
                        </div>
                      );
                    })()
                  ) : (
                    <div className="flex justify-center items-center h-64 text-gray-400">אין נתונים</div>
                  )}
                </div>
              </div>
            )}

          </div>
        </div>
      );
    };

    ReactDOM.render(<CryptoExitStrategy />, document.getElementById('root'));
  </script>
</body>
</html>
